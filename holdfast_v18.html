// SELECTION → TASK IMPORT
// ═══════════════════════════════════════════════════
let timState = {
  mode: 'group',       // 'group' | 'individual'
  lines: [],           // [{text, included, name, projId, childId, phaseId}]
  groupProjId: null,
  groupChildId: null,
  groupPhaseId: null,
};

// Track selection inside note editor and show/hide floating button
function initSelectionWatcher() {
  document.addEventListener('selectionchange', () => {
    const body = document.getElementById('note-body');
    if (!body) { hideSelBtn(); return; }
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed || !body.contains(sel.anchorNode)) { hideSelBtn(); return; }
    const text = sel.toString().trim();
    if (!text) { hideSelBtn(); return; }
    showSelBtn(sel);
  });
}

function showSelBtn(sel) {
  const btn = document.getElementById('sel-to-task-btn');
  if (!btn) return;
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  // Position above the selection, centred
  const btnW = 160;
  let left = rect.left + (rect.width / 2) - (btnW / 2);
  left = Math.max(8, Math.min(left, window.innerWidth - btnW - 8));
  const top = Math.max(8, rect.top - 44 + window.scrollY);
  btn.style.left = `${left}px`;
  btn.style.top = `${top}px`;
  btn.classList.add('visible');
}

function hideSelBtn() {
  document.getElementById('sel-to-task-btn')?.classList.remove('visible');
}

function openTaskImport() {
  hideSelBtn();
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const text = sel.toString();
  sel.removeAllRanges(); // deselect so it doesn't interfere

  // Parse lines — strip bullets/dashes, detect indent depth
  const rawLines = text.split(/\n/);
  timState.lines = [];
  rawLines.forEach(line => {
    if (!line.trim()) return;
    const leadSpaces = line.length - line.trimStart().length;
    const depth = Math.floor(leadSpaces / 2);
    const cleaned = line.trim()
      .replace(/^[-–—•*▸▶›»]\s*/, '')
      .replace(/^\d+[.)]\s*/, '')
      .replace(/^\[[ x]\]\s*/i, '')
      .trim();
    if (!cleaned) return;
    timState.lines.push({
      text: cleaned,
      included: true,
      name: cleaned,
      depth,
      projId: timState.groupProjId || null,
      childId: timState.groupChildId || null,
      phaseId: timState.groupPhaseId || null,
    });
  });

  if (!timState.lines.length) { toast('No text lines found'); return; }

  // Pre-select last used or first available project
  if (!timState.groupProjId) {
    const first = sortedProjects()[0];
    if (first) {
      timState.groupProjId = first._key;
      const firstChild = sortedChildren(first)[0];
      if (firstChild) timState.groupChildId = firstChild._key;
      const firstPhase = sortedPhases(first)[0];
      if (firstPhase) timState.groupPhaseId = firstPhase.id;
    }
  }
  // Propagate group defaults to each line
  timState.lines.forEach(l => {
    if (!l.projId)  l.projId  = timState.groupProjId;
    if (!l.childId) l.childId = timState.groupChildId;
    if (!l.phaseId) l.phaseId = timState.groupPhaseId;
  });

  renderTaskImportModal();
}

function renderTaskImportModal() {
  // Remove existing
  document.querySelector('.tim-overlay')?.remove();

  const overlay = document.createElement('div');
  overlay.className = 'tim-overlay';
  overlay.onclick = e => { if (e.target === overlay) closeTaskImport(); };

  const projects = sortedProjects();
  const isGroup = timState.mode === 'group';

  function projOptions(selectedId) {
    return projects.map(p =>
      `<option value="${p._key}" ${p._key===selectedId?'selected':''}>${escHtml(p.name)}\x3C/option>`
    ).join('');
  }

  function childOptions(projId, selectedId) {
    const proj = state.projects[projId];
    if (!proj) return '<option value="">— no items —\x3C/option>';
    return sortedChildren(proj).map(c =>
      `<option value="${c._key}" ${c._key===selectedId?'selected':''}>${escHtml(c.name)}\x3C/option>`
    ).join('');
  }

  function phaseOptions(projId, selectedId) {
    const proj = state.projects[projId];
    if (!proj) return '<option value="">— no phases —\x3C/option>';
    return sortedPhases(proj).map(ph =>
      `<option value="${ph.id}" ${ph.id===selectedId?'selected':''}>${escHtml(ph.name)}\x3C/option>`
    ).join('');
  }

  const includedCount = timState.lines.filter(l=>l.included).length;

  // Group destination pickers
  const groupDest = `
    <div class="tim-section-label">Destination (applies to all)\x3C/div>
    <div class="tim-dest">
      <div>
        <div class="tim-section-label">Project\x3C/div>
        <select class="tim-select" id="tim-g-proj" onchange="timGroupProjChange(this.value)">
          ${projOptions(timState.groupProjId)}
        \x3C/select>
      \x3C/div>
      <div>
        <div class="tim-section-label">Item\x3C/div>
        <select class="tim-select" id="tim-g-child" onchange="timGroupChildChange(this.value)">
          ${childOptions(timState.groupProjId, timState.groupChildId)}
        \x3C/select>
      \x3C/div>
      <div>
        <div class="tim-section-label">Phase\x3C/div>
        <select class="tim-select" id="tim-g-phase" onchange="timGroupPhaseChange(this.value)">
          ${phaseOptions(timState.groupProjId, timState.groupPhaseId)}
        \x3C/select>
      \x3C/div>
    \x3C/div>`;

  // Task rows
  const taskRows = timState.lines.map((line, i) => {
    const indentPx = line.depth * 16;
    const indivDest = !isGroup ? `
      <div class="tim-task-dest">
        <select class="tim-task-select" onchange="timLineProjChange(${i},this.value)">
          ${projOptions(line.projId)}
        \x3C/select>
        <select class="tim-task-select" onchange="timLineChildChange(${i},this.value)">
          ${childOptions(line.projId, line.childId)}
        \x3C/select>
        <select class="tim-task-select" onchange="timLinePhaseChange(${i},this.value)">
          ${phaseOptions(line.projId, line.phaseId)}
        \x3C/select>
      \x3C/div>` : '';
    return `
      <div class="tim-task-row ${line.included?'':'excluded'}" id="tim-row-${i}" style="padding-left:${12+indentPx}px">
        <div class="tim-task-top">
          <div class="tim-check ${line.included?'on':''}" onclick="timToggleLine(${i})">
            ${line.included?'✓':''}
          \x3C/div>
          <input class="tim-task-input" value="${escAttr(line.name)}" 
            oninput="timState.lines[${i}].name=this.value"
            placeholder="Task name">
        \x3C/div>
        ${indivDest}
      \x3C/div>`;
  }).join('');

  overlay.innerHTML = `
    <div class="tim-modal" onclick="event.stopPropagation()">
      <div class="tim-header">
        <span class="tim-title">Add to Tasks\x3C/span>
        <div class="tim-close" onclick="closeTaskImport()">✕\x3C/div>
      \x3C/div>
      <div class="tim-body">
        <div class="tim-section-label" style="margin-bottom:6px">Assignment Mode\x3C/div>
        <div class="tim-mode">
          <button class="tim-mode-btn ${isGroup?'active':''}" onclick="timSetMode('group')">
            📦 Group — same destination for all
          \x3C/button>
          <button class="tim-mode-btn ${!isGroup?'active':''}" onclick="timSetMode('individual')">
            🎯 Individual — assign each separately
          \x3C/button>
        \x3C/div>
        ${isGroup ? groupDest : ''}
        <div class="tim-section-label" style="margin-bottom:6px">Tasks (${includedCount} selected)\x3C/div>
        <div class="tim-tasks">${taskRows}\x3C/div>
      \x3C/div>
      <div class="tim-footer">
        <span class="tim-count">${includedCount} of ${timState.lines.length} tasks will be added\x3C/span>
        <div style="display:flex;gap:8px">
          <button class="btn btn-ghost" onclick="closeTaskImport()">Cancel\x3C/button>
          <button class="btn btn-primary" onclick="confirmTaskImport()">＋ Add ${includedCount} Task${includedCount!==1?'s':''}\x3C/button>
        \x3C/div>
      \x3C/div>
    \x3C/div>`;

  document.body.appendChild(overlay);
}

function closeTaskImport() {
  document.querySelector('.tim-overlay')?.remove();
}

// Group destination changes — propagate to all lines
function timGroupProjChange(val) {
  timState.groupProjId = val;
  const proj = state.projects[val];
  const firstChild = proj ? sortedChildren(proj)[0] : null;
  const firstPhase = proj ? sortedPhases(proj)[0] : null;
  timState.groupChildId = firstChild?._key || null;
  timState.groupPhaseId = firstPhase?.id || null;
  timState.lines.forEach(l => { l.projId=val; l.childId=timState.groupChildId; l.phaseId=timState.groupPhaseId; });
  renderTaskImportModal();
}
function timGroupChildChange(val) {
  timState.groupChildId = val;
  timState.lines.forEach(l => l.childId=val);
  renderTaskImportModal();
}
function timGroupPhaseChange(val) {
  timState.groupPhaseId = val;
  timState.lines.forEach(l => l.phaseId=val);
  renderTaskImportModal();
}

// Individual line destination changes
function timLineProjChange(i, val) {
  timState.lines[i].projId = val;
  const proj = state.projects[val];
  timState.lines[i].childId = sortedChildren(proj||{})[0]?._key || null;
  timState.lines[i].phaseId = sortedPhases(proj||{})[0]?.id || null;
  renderTaskImportModal();
}
function timLineChildChange(i, val) { timState.lines[i].childId=val; renderTaskImportModal(); }
function timLinePhaseChange(i, val) { timState.lines[i].phaseId=val; renderTaskImportModal(); }

function timToggleLine(i) {
  timState.lines[i].included = !timState.lines[i].included;
  renderTaskImportModal();
}

function timSetMode(mode) {
  timState.mode = mode;
  renderTaskImportModal();
}

async function confirmTaskImport() {
  const toAdd = timState.lines.filter(l => l.included && l.name.trim() && l.projId && l.childId && l.phaseId);
  if (!toAdd.length) { toast('No valid tasks to add'); return; }

  // Save last used destination
  timState.groupProjId  = toAdd[0].projId;
  timState.groupChildId = toAdd[0].childId;
  timState.groupPhaseId = toAdd[0].phaseId;

  await Promise.all(toAdd.map(l =>
    fbPush(`tasks/${l.projId}/${l.childId}/${l.phaseId}`, {
      name: l.name.trim(),
      status: 'todo',
      createdAt: Date.now(),
    })
  ));

  closeTaskImport();
  toast(`${toAdd.length} task${toAdd.length!==1?'s':''} added ✓`);
}

window.onerror = function(msg, src, line, col, err) {
  const el = document.getElementById('loading');
  if (el) {
    el.style.display = 'flex';
    el.innerHTML = `<div style="color:#ef4444;font-size:13px;text-align:center;padding:20px;max-width:80vw">
      <div style="font-size:24px;margin-bottom:12px">⚠️\x3C/div>
      <div style="font-weight:700;margin-bottom:8px">JavaScript Error\x3C/div>
      <div style="margin-bottom:6px">${msg}\x3C/div>
      <div style="color:#9898b0;font-size:11px">${src} line ${line}:${col}\x3C/div>
    \x3C/div>`;
  }
};
</script>
</body>
</html>
