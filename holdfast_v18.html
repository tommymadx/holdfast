<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holdfast</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f11;
  --surface: #1a1a1f;
  --surface2: #22222a;
  --surface3: #2a2a35;
  --border: #2e2e3a;
  --border2: #3a3a48;
  --text: #e8e8f0;
  --text2: #9898b0;
  --text3: #5a5a72;
  --accent: #7c5cfc;
  --accent2: #9d82fd;
  --accent-dim: rgba(124,92,252,0.15);
  --green: #22c55e;
  --green-dim: rgba(34,197,94,0.15);
  --blue: #3b82f6;
  --blue-dim: rgba(59,130,246,0.15);
  --amber: #f59e0b;
  --red: #ef4444;
  --red-dim: rgba(239,68,68,0.15);
  --sidebar-width: 248px;
  --topbar-height: 48px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;font-size:13px;}

/* ── SIDEBAR ── */
#sidebar{width:var(--sidebar-width);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;flex-shrink:0;overflow:hidden;}
.sb-header{padding:14px 16px 10px;border-bottom:1px solid var(--border);}
.sb-logo{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--accent2);letter-spacing:1px;line-height:1;}
.sb-sub{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;}
.sb-nav{flex:1;overflow-y:auto;padding:8px 0;}
.sb-nav::-webkit-scrollbar{width:4px;}
.sb-nav::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.sb-section-label{padding:8px 16px 4px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);}
.sb-footer{border-top:1px solid var(--border);padding:6px 0;}

/* nav rows */
.nav-row{display:flex;align-items:center;gap:7px;padding:5px 16px;cursor:pointer;color:var(--text2);font-size:12.5px;font-weight:500;transition:background .12s;position:relative;user-select:none;}
.nav-row:hover{background:var(--surface2);color:var(--text);}
.nav-row.active{background:var(--accent-dim);color:var(--accent2);}
.nav-row.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--accent);}
.nav-row .nr-icon{width:16px;height:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;}
.nav-row .nr-label{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nav-row .nr-chevron{font-size:9px;color:var(--text3);transition:transform .2s;flex-shrink:0;}
.nav-row .nr-chevron.open{transform:rotate(90deg);}
.nav-row .nr-menu{opacity:0;font-size:13px;color:var(--text3);padding:2px 5px;border-radius:4px;flex-shrink:0;transition:opacity .12s;}
.nav-row:hover .nr-menu{opacity:1;}
.nav-row .nr-menu:hover{background:var(--surface3);color:var(--text);}
.nav-row .nr-badge{font-size:10px;background:var(--surface3);color:var(--text3);border-radius:10px;padding:1px 6px;flex-shrink:0;}

/* child rows */
.child-row{display:flex;align-items:center;gap:7px;padding:5px 16px 5px 32px;cursor:pointer;color:var(--text2);font-size:12px;font-weight:500;transition:background .12s;position:relative;user-select:none;}
.child-row:hover{background:var(--surface2);color:var(--text);}
.child-row.active{background:var(--accent-dim);color:var(--accent2);}
.child-row.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--accent);}
.child-row .cr-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.child-row .cr-label{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.child-row .cr-menu{opacity:0;font-size:13px;color:var(--text3);padding:2px 5px;border-radius:4px;flex-shrink:0;}
.child-row:hover .cr-menu{opacity:1;}
.child-row .cr-menu:hover{background:var(--surface3);color:var(--text);}
.child-row .cr-progress{font-size:9px;color:var(--text3);background:var(--surface3);border-radius:8px;padding:1px 5px;flex-shrink:0;}
.child-row .cr-done{font-size:10px;color:var(--green);flex-shrink:0;}
.child-row .cr-date{font-size:9px;padding:1px 5px;border-radius:8px;flex-shrink:0;white-space:nowrap;}
.child-row .cr-date.out{color:var(--text3);background:var(--surface3);}
.child-row .cr-date.soon{color:#f59e0b;background:rgba(245,158,11,.15);}
.child-row .cr-date.upcoming{color:var(--text3);background:var(--surface3);}
/* two-line child row for name + date */
.child-row{display:flex;align-items:center;gap:7px;padding:5px 16px 5px 32px;cursor:pointer;color:var(--text2);font-size:12px;font-weight:500;transition:background .12s;position:relative;user-select:none;min-height:32px;}

.nav-children{overflow:hidden;transition:max-height .25s ease;}

.add-project-btn{display:flex;align-items:center;gap:7px;padding:6px 16px;cursor:pointer;color:var(--text3);font-size:12px;font-weight:500;transition:all .12s;}
.add-project-btn:hover{color:var(--accent2);background:var(--accent-dim);}

/* progress bar under project */
.project-progress-bar{height:2px;background:var(--surface3);border-radius:1px;overflow:hidden;margin:1px 16px 4px 32px;}
.project-progress-fill{height:100%;background:var(--green);border-radius:1px;transition:width .4s ease;}

/* ── MAIN ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#topbar{height:var(--topbar-height);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:10px;background:var(--surface);flex-shrink:0;}
.tb-breadcrumb{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--text2);}
.tb-breadcrumb .crumb{color:var(--text2);}
.tb-breadcrumb .crumb.cur{color:var(--text);font-weight:600;}
.tb-breadcrumb .sep{color:var(--text3);}
.tb-views{display:flex;align-items:center;gap:2px;margin-left:auto;}
.view-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:6px;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .12s;border:1px solid transparent;}
.view-btn:hover{background:var(--surface2);color:var(--text);}
.view-btn.active{background:var(--accent-dim);color:var(--accent2);border-color:rgba(124,92,252,.3);}

#view-content{flex:1;overflow:hidden;display:flex;flex-direction:column;}

/* ── LIST VIEW ── */
#list-view{flex:1;overflow-y:auto;padding:0;}
#list-view::-webkit-scrollbar{width:6px;}
#list-view::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

.col-headers{display:grid;grid-template-columns:36px 2fr 120px 110px 90px 120px 110px;padding:6px 20px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:20;}
.col-header{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;}

/* single/child section in album view */
.child-section{border-bottom:1px solid var(--border);}
.child-section-header{display:flex;align-items:center;gap:10px;padding:9px 20px;background:var(--surface);cursor:pointer;user-select:none;border-bottom:1px solid var(--border);}
.child-section-header:hover{background:var(--surface2);}
.cs-chevron{font-size:10px;color:var(--text3);transition:transform .2s;}
.cs-chevron.open{transform:rotate(90deg);}
.cs-title{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;color:var(--text);}
.cs-count{font-size:10px;color:var(--text3);background:var(--surface3);padding:2px 7px;border-radius:10px;}

/* phase group */
.phase-header{display:flex;align-items:center;gap:10px;padding:7px 20px;background:var(--bg);cursor:pointer;user-select:none;border-bottom:1px solid var(--border);}
.phase-header:hover{background:var(--surface);}
.ph-chevron{font-size:9px;color:var(--text3);transition:transform .2s;}
.ph-chevron.open{transform:rotate(90deg);}
.phase-pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px;}
.ph-count{font-size:11px;color:var(--text3);}
.ph-add{margin-left:auto;font-size:11px;color:var(--text3);padding:3px 8px;border-radius:4px;cursor:pointer;opacity:0;transition:opacity .12s;}
.phase-header:hover .ph-add{opacity:1;}
.ph-add:hover{background:var(--surface2);color:var(--text2);}

/* phase pill colors */
.pc-0{background:rgba(124,92,252,.2);color:#b39dfc;}
.pc-1{background:rgba(245,158,11,.2);color:#fbbf24;}
.pc-2{background:rgba(239,68,68,.2);color:#f87171;}
.pc-3{background:rgba(34,197,94,.2);color:#4ade80;}
.pc-4{background:rgba(59,130,246,.2);color:#60a5fa;}
.pc-5{background:rgba(249,115,22,.2);color:#fb923c;}

/* task rows */
.task-row{display:grid;grid-template-columns:36px 2fr 120px 110px 90px 120px 110px;padding:0 20px;border-bottom:1px solid var(--border);min-height:38px;align-items:center;transition:background .1s;position:relative;}
.task-row:hover{background:var(--surface);}
.task-row.subtask{background:rgba(0,0,0,.15);}
.task-row.subtask:hover{background:var(--surface);}
.task-row.selected{background:rgba(124,92,252,.08);}
.task-row.selected:hover{background:rgba(124,92,252,.13);}

.row-first-col{display:flex;align-items:center;justify-content:center;gap:2px;}
.row-checkbox{width:15px;height:15px;border-radius:3px;border:1.5px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;font-size:9px;color:white;flex-shrink:0;}
.row-checkbox:hover{border-color:var(--accent);}
.row-checkbox.checked{background:var(--accent);border-color:var(--accent);}
.row-expand{display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);font-size:9px;width:16px;height:16px;border-radius:3px;transition:all .12s;flex-shrink:0;}
.row-expand:hover{background:var(--surface2);color:var(--text);}

.task-name-cell{display:flex;align-items:center;gap:7px;min-width:0;padding-right:8px;}
.subtask-indent{padding-left:24px;}
.task-status-dot{width:16px;height:16px;border-radius:50%;flex-shrink:0;border:2px solid;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .12s;}
.task-status-dot.todo{border-color:var(--border2);background:transparent;}
.task-status-dot.todo:hover{border-color:var(--text2);}
.task-status-dot.in-progress{border-color:var(--blue);background:var(--blue-dim);}
.task-status-dot.complete{border-color:var(--green);background:var(--green);}
.task-status-dot.complete::after{content:'✓';font-size:9px;color:white;font-weight:700;}
.task-name-text{font-size:12.5px;font-weight:500;color:var(--text);cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;}
.task-name-text:hover{color:var(--accent2);}
.task-name-input{font-size:12.5px;font-weight:500;color:var(--text);background:transparent;border:none;border-bottom:1.5px solid var(--accent);padding:0 2px;flex:1;min-width:0;outline:none;font-family:inherit;}

.task-hover-tools{display:none;align-items:center;gap:2px;margin-left:4px;flex-shrink:0;}
.task-row:hover .task-hover-tools{display:flex;}
.hover-tool-btn{width:22px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);font-size:12px;transition:all .12s;}
.hover-tool-btn:hover{background:var(--surface3);color:var(--text);}

.assignee-cell{display:flex;align-items:center;gap:4px;cursor:pointer;}
.avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;border:1.5px solid var(--bg);}
.avatar-empty{width:22px;height:22px;border-radius:50%;border:1.5px dashed var(--border2);display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:11px;cursor:pointer;}
.avatar-empty:hover{border-color:var(--text2);color:var(--text2);}

.date-cell{font-size:12px;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:4px;}
.date-cell:hover{color:var(--text);}
.date-cell.overdue{color:var(--red);}
.date-cell.soon{color:var(--amber);}
.date-cell.empty{color:var(--text3);}

.priority-cell{display:flex;align-items:center;gap:5px;cursor:pointer;font-size:12px;color:var(--text2);padding:3px 0;}
.priority-cell:hover{color:var(--text);}

.status-cell{cursor:pointer;}
.status-badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap;}
.status-badge.todo{background:var(--surface3);color:var(--text2);}
.status-badge.in-progress{background:var(--blue-dim);color:#60a5fa;}
.status-badge.complete{background:var(--green-dim);color:var(--green);}

.add-task-row{display:flex;align-items:center;gap:8px;padding:7px 20px 7px 56px;border-bottom:1px solid var(--border);cursor:pointer;color:var(--text3);font-size:12px;transition:all .12s;}
.add-task-row:hover{background:var(--surface);color:var(--text2);}

.new-task-row{display:grid;grid-template-columns:36px 2fr 120px 110px 90px 120px 110px;padding:0 20px;border-bottom:1px solid var(--accent);min-height:38px;align-items:center;background:var(--surface);}
.new-task-input{font-size:12.5px;font-weight:500;color:var(--text);background:transparent;border:none;border-bottom:1.5px solid var(--accent);outline:none;font-family:inherit;width:100%;padding:0 2px;}
.new-task-input::placeholder{color:var(--text3);}

/* ── DROPDOWNS ── */
.dropdown-overlay{position:fixed;inset:0;z-index:999;}
.dropdown-menu{position:fixed;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:4px;min-width:160px;z-index:1000;box-shadow:0 8px 32px rgba(0,0,0,.5);}
.dropdown-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:5px;cursor:pointer;font-size:12.5px;color:var(--text);transition:background .1s;}
.dropdown-item:hover{background:var(--surface3);}
.dropdown-sep{height:1px;background:var(--border);margin:4px 0;}

/* ── ACTION BAR ── */
#action-bar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface2);border:1px solid var(--border2);border-radius:12px;padding:8px 16px;display:flex;align-items:center;gap:8px;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:500;transition:transform .25s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;}
#action-bar.visible{transform:translateX(-50%) translateY(0);}
.ab-count{font-size:12.5px;font-weight:600;color:var(--text);padding-right:8px;border-right:1px solid var(--border2);margin-right:4px;}
.ab-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:7px;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .12s;}
.ab-btn:hover{background:var(--surface3);color:var(--text);}
.ab-btn.danger:hover{background:var(--red-dim);color:var(--red);}
.ab-sep{width:1px;height:20px;background:var(--border2);}
.ab-close{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);font-size:14px;margin-left:4px;transition:all .12s;}
.ab-close:hover{background:var(--surface3);color:var(--text);}

/* ── HOME DASHBOARD ── */
#home-view{flex:1;overflow-y:auto;padding:32px 40px;}
#home-view::-webkit-scrollbar{width:6px;}
#home-view::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
.home-title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;color:var(--text);margin-bottom:8px;}
.home-sub{font-size:13px;color:var(--text3);margin-bottom:32px;}
.project-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.project-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;cursor:pointer;transition:all .15s;position:relative;}
.project-card:hover{border-color:var(--border2);background:var(--surface2);}
.pc-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:8px;}
.pc-name{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:var(--text);margin-bottom:4px;}
.pc-type{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px;}
.pc-stats{display:flex;gap:16px;margin-bottom:12px;}
.pc-stat{font-size:12px;color:var(--text2);}
.pc-stat span{font-weight:700;color:var(--text);}
.pc-bar-wrap{height:3px;background:var(--surface3);border-radius:2px;overflow:hidden;}
.pc-bar{height:100%;background:var(--green);border-radius:2px;transition:width .4s;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:2000;display:flex;align-items:center;justify-content:center;}
.modal{background:var(--surface2);border:1px solid var(--border2);border-radius:14px;padding:28px;width:520px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.6);}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1.5px;margin-bottom:24px;color:var(--text);}
.modal-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);margin-bottom:6px;}
.modal-input{width:100%;background:var(--surface3);border:1px solid var(--border2);border-radius:7px;padding:9px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color .15s;margin-bottom:18px;}
.modal-input:focus{border-color:var(--accent);}
.type-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:18px;}
.type-card{background:var(--surface3);border:2px solid var(--border2);border-radius:9px;padding:14px 12px;cursor:pointer;transition:all .15s;text-align:center;}
.type-card:hover{border-color:var(--border2);background:var(--surface2);}
.type-card.selected{border-color:var(--accent);background:var(--accent-dim);}
.type-card .tc-icon{font-size:22px;margin-bottom:6px;}
.type-card .tc-name{font-size:12px;font-weight:700;color:var(--text);}
.type-card .tc-desc{font-size:10px;color:var(--text3);margin-top:2px;}
.phases-editor{margin-bottom:18px;}
.phase-edit-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.phase-edit-input{flex:1;background:var(--surface3);border:1px solid var(--border2);border-radius:6px;padding:7px 10px;color:var(--text);font-size:12.5px;font-family:inherit;outline:none;}
.phase-edit-input:focus{border-color:var(--accent);}
.phase-edit-remove{width:24px;height:24px;border-radius:5px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);font-size:14px;transition:all .12s;flex-shrink:0;}
.phase-edit-remove:hover{background:var(--red-dim);color:var(--red);}
.add-phase-btn{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text3);cursor:pointer;padding:5px 0;transition:color .12s;}
.add-phase-btn:hover{color:var(--accent2);}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:4px;}
.btn{padding:8px 18px;border-radius:7px;font-size:12.5px;font-weight:600;cursor:pointer;transition:all .15s;border:none;font-family:inherit;}
.btn-primary{background:var(--accent);color:white;}
.btn-primary:hover{background:var(--accent2);}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2);}
.btn-ghost:hover{background:var(--surface3);color:var(--text);}

/* ── SETTINGS ── */
#settings-view{flex:1;overflow-y:auto;padding:32px 40px;}
.settings-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;margin-bottom:28px;}
.settings-section{margin-bottom:36px;}
.settings-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);margin-bottom:14px;padding-bottom:7px;border-bottom:1px solid var(--border);}
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;}
.team-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;flex-direction:column;align-items:center;gap:8px;}
.team-avatar-lg{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;}
.team-name{font-size:13px;font-weight:600;}
.team-role{font-size:11px;color:var(--text3);}

/* ── PLACEHOLDER VIEWS ── */
#gantt-view{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
.ph-icon{font-size:48px;opacity:.3;}
.ph-text{font-size:14px;color:var(--text3);}

/* ── LOADING ── */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:9998;}
.loading-logo{font-family:'Bebas Neue',sans-serif;font-size:40px;color:var(--accent2);letter-spacing:3px;}
.loading-bar{width:160px;height:2px;background:var(--surface2);border-radius:1px;overflow:hidden;}
.loading-bar-fill{height:100%;background:var(--accent);border-radius:1px;animation:lpulse 1.2s ease-in-out infinite;}
@keyframes lpulse{0%{width:0%;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0%;margin-left:100%}}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:8px 18px;border-radius:8px;font-size:12.5px;box-shadow:0 4px 20px rgba(0,0,0,.4);opacity:0;transition:all .3s;z-index:9999;pointer-events:none;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── NOTES ── */
#notes-fab{position:fixed;bottom:28px;right:28px;width:44px;height:44px;border-radius:50%;background:var(--surface2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;box-shadow:0 4px 20px rgba(0,0,0,.4);z-index:600;transition:all .2s;user-select:none;}
#notes-fab:hover{background:var(--surface3);border-color:var(--accent);transform:scale(1.08);}
#notes-fab.active{background:var(--accent-dim);border-color:var(--accent);}

#notes-panel{position:fixed;bottom:82px;right:28px;width:680px;max-width:calc(100vw - 56px);height:520px;background:var(--surface);border:1px solid var(--border2);border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.6);z-index:599;display:flex;flex-direction:column;overflow:hidden;transform:scale(.95) translateY(12px);opacity:0;pointer-events:none;transition:transform .22s cubic-bezier(.34,1.56,.64,1),opacity .18s ease;}
#notes-panel.open{transform:scale(1) translateY(0);opacity:1;pointer-events:all;}

.notes-panel-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px;border-bottom:1px solid var(--border);flex-shrink:0;}
.notes-panel-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:var(--text);}
.notes-panel-actions{display:flex;align-items:center;gap:6px;}
.notes-new-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:7px;font-size:12px;font-weight:600;background:var(--accent);color:white;cursor:pointer;transition:background .12s;border:none;font-family:inherit;}
.notes-new-btn:hover{background:var(--accent2);}
.notes-close-btn{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);font-size:16px;transition:all .12s;}
.notes-close-btn:hover{background:var(--surface3);color:var(--text);}

.notes-body{display:flex;flex:1;overflow:hidden;}

/* notes list pane */
.notes-list{width:200px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto;padding:8px 0;}
.notes-list::-webkit-scrollbar{width:3px;}
.notes-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.note-list-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s;position:relative;}
.note-list-item:hover{background:var(--surface2);}
.note-list-item.active{background:var(--accent-dim);}
.note-list-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--accent);}
.nli-title{font-size:12.5px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;}
.nli-preview{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;}
.nli-date{font-size:10px;color:var(--text3);}
.nli-delete{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text3);opacity:0;transition:all .12s;cursor:pointer;}
.note-list-item:hover .nli-delete{opacity:1;}
.nli-delete:hover{background:var(--red-dim);color:var(--red);}
.notes-empty-list{padding:20px 14px;font-size:12px;color:var(--text3);text-align:center;line-height:1.6;}

/* notes editor pane */
.notes-editor{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
.notes-editor-empty{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:var(--text3);}
.notes-editor-empty .ne-icon{font-size:36px;opacity:.3;}
.notes-editor-empty .ne-text{font-size:13px;}
.note-title-input{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:var(--text);background:transparent;border:none;outline:none;padding:16px 20px 8px;width:100%;border-bottom:1px solid var(--border);flex-shrink:0;}
.note-title-input::placeholder{color:var(--text3);}
.note-meta{padding:5px 20px;font-size:11px;color:var(--text3);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;}

/* toolbar */
.note-toolbar{display:flex;align-items:center;gap:2px;padding:6px 12px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;background:var(--surface);}
.tb-btn{width:28px;height:28px;border-radius:5px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:13px;transition:all .12s;border:none;background:transparent;font-family:inherit;}
.tb-btn:hover{background:var(--surface3);color:var(--text);}
.tb-btn.active{background:var(--accent-dim);color:var(--accent2);}
.tb-btn.bold{font-weight:800;font-size:13px;}
.tb-btn.italic{font-style:italic;font-size:13px;}
.tb-btn.underline{text-decoration:underline;font-size:13px;}
.tb-btn.strike{text-decoration:line-through;font-size:13px;}
.tb-sep{width:1px;height:18px;background:var(--border2);margin:0 4px;flex-shrink:0;}
.tb-select{background:var(--surface3);border:1px solid var(--border2);border-radius:5px;color:var(--text2);font-size:11px;font-family:inherit;padding:3px 6px;outline:none;cursor:pointer;height:28px;}
.tb-select:focus{border-color:var(--accent);}

/* rich editor body */
.note-rich-body{flex:1;overflow-y:auto;padding:14px 20px 20px;outline:none;font-size:13px;line-height:1.8;color:var(--text);background:var(--bg);caret-color:var(--accent2);}
.note-rich-body *{color:var(--text);}
.note-rich-body::-webkit-scrollbar{width:4px;}
.note-rich-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.note-rich-body:empty::before{content:attr(data-placeholder);color:var(--text3);pointer-events:none;}
.note-rich-body h1{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;color:var(--text);margin:8px 0 4px;line-height:1.2;}
.note-rich-body h2{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.5px;color:var(--text);margin:8px 0 4px;line-height:1.2;}
.note-rich-body h3{font-size:15px;font-weight:700;color:var(--text);margin:6px 0 3px;}
.note-rich-body p{margin:2px 0;color:var(--text);}
.note-rich-body ul{padding-left:20px;margin:4px 0;}
.note-rich-body ol{padding-left:20px;margin:4px 0;}
.note-rich-body li{margin:2px 0;color:var(--text);}
.note-rich-body blockquote{border-left:3px solid var(--accent);padding:4px 12px;margin:6px 0;color:var(--text2) !important;font-style:italic;}
.note-rich-body blockquote *{color:var(--text2) !important;}
.note-rich-body hr{border:none;border-top:1px solid var(--border2);margin:12px 0;}
.note-rich-body b,.note-rich-body strong{font-weight:700;}
.note-rich-body i,.note-rich-body em{font-style:italic;}
.note-rich-body u{text-decoration:underline;}
.note-rich-body s{text-decoration:line-through;color:var(--text2) !important;}
/* checklist items */
.note-rich-body ul.checklist{list-style:none;padding-left:4px;}
.note-rich-body ul.checklist li{display:flex;align-items:flex-start;gap:8px;padding:1px 0;}
.note-rich-body ul.checklist li input[type=checkbox]{margin-top:3px;accent-color:var(--accent);flex-shrink:0;cursor:pointer;width:14px;height:14px;}
.note-rich-body ul.checklist li.checked{color:var(--text3) !important;text-decoration:line-through;}
.note-rich-body ul.checklist li.checked *{color:var(--text3) !important;}

.note-save-indicator{padding:3px 20px 6px;font-size:11px;color:var(--text3);flex-shrink:0;min-height:22px;}

.dot-0{background:#7c5cfc;} .dot-1{background:#3b82f6;} .dot-2{background:#f97316;}
.dot-3{background:#ef4444;} .dot-4{background:#22c55e;} .dot-5{background:#a855f7;}
.dot-6{background:#ec4899;} .dot-7{background:#14b8a6;} .dot-8{background:#eab308;}
.dot-complete{background:var(--green)!important;box-shadow:0 0 6px rgba(34,197,94,.5);}

/* ── SELECTION → TASK FLOAT BTN ── */
#sel-to-task-btn{position:fixed;display:none;align-items:center;gap:6px;padding:7px 13px;border-radius:20px;background:var(--accent);color:white;font-size:12px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(124,92,252,.5);z-index:2100;white-space:nowrap;user-select:none;transition:transform .12s,box-shadow .12s;border:none;font-family:inherit;letter-spacing:.3px;}
#sel-to-task-btn:hover{transform:scale(1.05);box-shadow:0 6px 24px rgba(124,92,252,.6);}
#sel-to-task-btn.visible{display:flex;}

/* ── TASK IMPORT MODAL ── */
.tim-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:3000;display:flex;align-items:center;justify-content:center;}
.tim-modal{background:var(--surface2);border:1px solid var(--border2);border-radius:14px;width:600px;max-width:95vw;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 24px 64px rgba(0,0,0,.7);overflow:hidden;}
.tim-header{display:flex;align-items:center;justify-content:space-between;padding:18px 22px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.tim-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--text);}
.tim-close{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);font-size:16px;transition:all .12s;}
.tim-close:hover{background:var(--surface3);color:var(--text);}
.tim-body{flex:1;overflow-y:auto;padding:18px 22px;}
.tim-body::-webkit-scrollbar{width:4px;}
.tim-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.tim-section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);margin-bottom:6px;}
.tim-dest{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;}
.tim-select{background:var(--surface3);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-size:12.5px;font-family:inherit;padding:8px 10px;outline:none;cursor:pointer;transition:border-color .12s;width:100%;}
.tim-select:focus{border-color:var(--accent);}
.tim-select option{background:var(--surface2);}
.tim-mode{display:flex;gap:6px;margin-bottom:18px;}
.tim-mode-btn{flex:1;padding:7px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;transition:all .12s;border:1px solid var(--border2);background:transparent;color:var(--text2);font-family:inherit;text-align:center;}
.tim-mode-btn.active{background:var(--accent-dim);color:var(--accent2);border-color:var(--accent);}
.tim-tasks{display:flex;flex-direction:column;gap:6px;margin-bottom:4px;}
.tim-task-row{background:var(--surface3);border:1px solid var(--border2);border-radius:8px;padding:10px 12px;transition:all .12s;}
.tim-task-row.excluded{opacity:.35;}
.tim-task-top{display:flex;align-items:center;gap:9px;}
.tim-check{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;color:white;flex-shrink:0;transition:all .12s;}
.tim-check.on{background:var(--accent);border-color:var(--accent);}
.tim-task-input{font-size:12.5px;font-weight:500;color:var(--text);background:transparent;border:none;border-bottom:1px solid transparent;outline:none;font-family:inherit;flex:1;padding:0 2px;transition:border-color .12s;}
.tim-task-input:focus{border-bottom-color:var(--accent);}
.tim-task-dest{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:8px;padding-left:25px;}
.tim-task-select{background:var(--surface2);border:1px solid var(--border2);border-radius:5px;color:var(--text2);font-size:11px;font-family:inherit;padding:4px 7px;outline:none;cursor:pointer;width:100%;}
.tim-task-select:focus{border-color:var(--accent);}
.tim-task-select option{background:var(--surface2);}
.tim-footer{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;border-top:1px solid var(--border);flex-shrink:0;}
.tim-count{font-size:12px;color:var(--text3);}

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
// ═══════════════════════════════════════════════════
// FIREBASE
// ═══════════════════════════════════════════════════
firebase.initializeApp({
  apiKey:"AIzaSyDxYaI67RPV5wBlkPneTKY1YMasVQJxG-Y",
  authDomain:"app-timeline-v2.firebaseapp.com",
  projectId:"app-timeline-v2",
  storageBucket:"app-timeline-v2.firebasestorage.app",
  messagingSenderId:"145319848970",
  appId:"1:145319848970:web:b6086b8caf00faf8a2c3f3",
  databaseURL:"https://app-timeline-v2-default-rtdb.firebaseio.com"
});
const db = firebase.database();
const ROOT = 'holdfast_v8';

function fbRef(p){ return db.ref(`${ROOT}/${p}`); }
async function fbSet(p,v){ await fbRef(p).set(v); }
async function fbUpdate(p,v){ await fbRef(p).update(v); }
async function fbPush(p,v){ const r=fbRef(p).push(); await r.set(v); return r.key; }
async function fbRemove(p){ await fbRef(p).remove(); }
function fbListen(p,cb){ fbRef(p).on('value',s=>cb(s.val())); }

// ═══════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════
const TEAM_MEMBERS = [
  {id:'charlie',name:'Charlie',initials:'CH',color:'#7c5cfc',role:'Lead Vocals / Guitar / Keys'},
  {id:'mikey',  name:'Mikey',  initials:'MI',color:'#3b82f6',role:'Bass / Vocals'},
  {id:'tommy',  name:'Tommy',  initials:'TM',color:'#f97316',role:'Drums / Vocals'},
  {id:'casey',  name:'Casey',  initials:'CA',color:'#22c55e',role:'Manager'},
];
const PRIORITIES = [
  {value:'urgent',label:'Urgent',icon:'🚩',color:'#ef4444'},
  {value:'high',  label:'High',  icon:'🏴',color:'#f59e0b'},
  {value:'normal',label:'Normal',icon:'🔵',color:'#3b82f6'},
  {value:'low',   label:'Low',   icon:'⚑', color:'#6b7280'},
];
const STATUSES = [
  {value:'todo',       label:'To Do',      cls:'todo'},
  {value:'in-progress',label:'In Progress',cls:'in-progress'},
  {value:'complete',   label:'Complete',   cls:'complete'},
];
const PROJECT_TYPES = [
  {id:'album', label:'Album Release', icon:'💿', desc:'Singles + campaign',
   phases:['Creative Prep','Marketing Prep','Execution','Monitoring']},
  {id:'tour',  label:'Tour',          icon:'🎤', desc:'Legs, venues, logistics',
   phases:['Planning','Promotion','On Sale','Show Day']},
  {id:'custom',label:'Custom',        icon:'📁', desc:'Start from scratch',
   phases:['Phase I','Phase II','Phase III']},
];
const DOT_COLORS = ['dot-0','dot-1','dot-2','dot-3','dot-4','dot-5','dot-6','dot-7','dot-8'];

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let state = {
  view: 'home',          // 'home'|'list'|'gantt'|'settings'
  projectId: null,
  childId: null,         // null = show all children
  expandedProjects: {},
  expandedChildren: {},
  expandedPhases: {},
  expandedTasks: {},
  selectedTasks: new Set(),
  projects: {},          // live from firebase
  tasks: {},             // live from firebase
};
let activeDropdown = null;

// ═══════════════════════════════════════════════════
// SEED DATA — Darkness To Light
// ═══════════════════════════════════════════════════
const DTL_SEED = {
  name: 'Darkness To Light',
  type: 'album',
  color: 'dot-0',
  createdAt: Date.now(),
  phases: {
    ph1:{id:'ph1',name:'Creative Prep',  color:'pc-0',order:0},
    ph2:{id:'ph2',name:'Marketing Prep', color:'pc-1',order:1},
    ph3:{id:'ph3',name:'Execution',      color:'pc-2',order:2},
    ph4:{id:'ph4',name:'Monitoring',     color:'pc-3',order:3},
  },
  children: {
    c1:{id:'c1',name:'When The Magic Is Gone', color:'dot-0',order:0,releaseDate:'2026-03-06'},
    c2:{id:'c2',name:'Homeless In The Rain',   color:'dot-1',order:1,releaseDate:'2026-03-20'},
    c3:{id:'c3',name:'2084',                   color:'dot-2',order:2,releaseDate:'2026-04-17'},
    c4:{id:'c4',name:'Tragedy',                color:'dot-3',order:3,releaseDate:'2026-05-15'},
    c5:{id:'c5',name:'Hope Is On Your Side',   color:'dot-4',order:4,releaseDate:'2026-06-12'},
    c6:{id:'c6',name:'Stranger and The Sheriff',color:'dot-5',order:5,releaseDate:'2026-07-10'},
  }
};

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
async function init() {
  const snap = await fbRef('projects').get();
  if (!snap.exists()) {
    await fbSet('projects/dtl', DTL_SEED);
  } else {
    // Patch release dates onto existing DTL children if missing
    const releaseDates = {
      c1:'2026-03-06', c2:'2026-03-20', c3:'2026-04-17',
      c4:'2026-05-15', c5:'2026-06-12', c6:'2026-07-10'
    };
    const dtlSnap = await fbRef('projects/dtl/children').get();
    if (dtlSnap.exists()) {
      const children = dtlSnap.val();
      const patches = {};
      Object.entries(releaseDates).forEach(([cId, date]) => {
        if (children[cId] && !children[cId].releaseDate) {
          patches[`${cId}/releaseDate`] = date;
        }
      });
      if (Object.keys(patches).length > 0) {
        await fbUpdate('projects/dtl/children', patches);
      }
    }
  }
  fbListen('projects', data => { state.projects = data || {}; renderAll(); });
  fbListen('tasks',    data => { state.tasks    = data || {}; renderAll(); });
  initNotes();
  initSelectionWatcher();
  document.getElementById('loading').style.display = 'none';
}

// ═══════════════════════════════════════════════════
// RENDER ALL
// ═══════════════════════════════════════════════════
function renderAll() {
  renderSidebar();
  renderBreadcrumb();
  renderViewTabs();
  renderCurrentView();
  updateActionBar();
}

// ═══════════════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════════════
function renderSidebar() {
  const nav = document.getElementById('sb-nav');
  let html = '';

  // Home
  html += `<div class="nav-row ${state.view==='home'&&!state.projectId?'active':''}" onclick="goHome()">
    <span class="nr-icon">🏠\x3C/span><span class="nr-label">Home\x3C/span>
  \x3C/div>`;

  html += `<div class="sb-section-label">Projects\x3C/div>`;

  const projects = sortedProjects();
  projects.forEach(proj => {
    const isExpanded = state.expandedProjects[proj._key] !== false;
    const isProjActive = state.projectId === proj._key && !state.childId && state.view !== 'home';
    const comp = getProjectCompletion(proj._key);
    const projDone = comp.pct === 100 && comp.total > 0;

    html += `
      <div class="nav-row ${isProjActive?'active':''}" onclick="selectProject('${proj._key}')">
        <span class="nr-icon">${projDone?'✅':proj.type==='album'?'💿':proj.type==='tour'?'🎤':'📁'}\x3C/span>
        <span class="nr-label">${escHtml(proj.name)}\x3C/span>
        <span class="nr-menu" onclick="projectMenu(event,'${proj._key}')">•••\x3C/span>
        <span class="nr-chevron ${isExpanded?'open':''}" onclick="toggleProjectExpand(event,'${proj._key}')">▶\x3C/span>
      \x3C/div>
    `;

    // Progress bar
    if (comp.total > 0) {
      html += `<div class="project-progress-bar"><div class="project-progress-fill" style="width:${comp.pct}%">\x3C/div>\x3C/div>`;
    }

    // Children
    const children = sortedChildren(proj);
    html += `<div class="nav-children" style="max-height:${isExpanded?'600px':'0'}">`;
    children.forEach(child => {
      const isChildActive = state.childId === child._key && state.projectId === proj._key;
      const cc = getChildCompletion(proj._key, child._key);
      const dotCls = cc.complete && cc.total>0 ? child.color+' dot-complete' : child.color;
      const badge = cc.total===0 ? '' : cc.complete
        ? `<span class="cr-done">✓\x3C/span>`
        : `<span class="cr-progress">${cc.done}/${cc.total}\x3C/span>`;
      const dateBadge = renderReleaseDateBadge(child.releaseDate);
      html += `
        <div class="child-row ${isChildActive?'active':''}" onclick="selectChild('${proj._key}','${child._key}')">
          <span class="cr-dot ${dotCls}">\x3C/span>
          <span class="cr-label">${escHtml(child.name)}\x3C/span>
          ${dateBadge}
          ${badge}
          <span class="cr-menu" onclick="childMenu(event,'${proj._key}','${child._key}')">•••\x3C/span>
        \x3C/div>
      `;
    });
    // Add child button
    html += `<div class="child-row" style="color:var(--text3)" onclick="addChildInline('${proj._key}')">
      <span class="cr-dot" style="background:var(--text3);opacity:.4">\x3C/span>
      <span class="cr-label" style="font-style:italic">+ Add item\x3C/span>
    \x3C/div>`;
    html += `\x3C/div>`;
  });

  html += `<div class="add-project-btn" onclick="openNewProjectModal()">＋ New Project\x3C/div>`;
  nav.innerHTML = html;
}

function sortedProjects() {
  return Object.entries(state.projects)
    .map(([k,v])=>({...v,_key:k}))
    .sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));
}

function sortedChildren(proj) {
  if (!proj.children) return [];
  return Object.entries(proj.children)
    .map(([k,v])=>({...v,_key:k}))
    .sort((a,b)=>(a.order??0)-(b.order??0));
}

// ═══════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════
function goHome() {
  state.view = 'home'; state.projectId = null; state.childId = null;
  renderAll();
}

function selectProject(pKey) {
  state.projectId = pKey; state.childId = null; state.view = 'list';
  renderAll();
}

function selectChild(pKey, cKey) {
  state.projectId = pKey; state.childId = cKey; state.view = 'list';
  renderAll();
}

function toggleProjectExpand(e, pKey) {
  e.stopPropagation();
  state.expandedProjects[pKey] = state.expandedProjects[pKey] === false ? true : false;
  renderSidebar();
}

function showSettings() {
  state.view = 'settings'; renderAll();
}

// ═══════════════════════════════════════════════════
// BREADCRUMB & TABS
// ═══════════════════════════════════════════════════
function renderBreadcrumb() {
  const el = document.getElementById('tb-breadcrumb');
  if (state.view === 'home') { el.innerHTML = `<span class="crumb cur">Home\x3C/span>`; return; }
  if (state.view === 'settings') { el.innerHTML = `<span class="crumb cur">Settings\x3C/span>`; return; }
  const proj = state.projects[state.projectId];
  if (!proj) { el.innerHTML=''; return; }
  let html = `<span class="crumb" style="cursor:pointer" onclick="selectProject('${state.projectId}')">${escHtml(proj.name)}\x3C/span>`;
  if (state.childId) {
    const child = proj.children?.[state.childId];
    if (child) html += `<span class="sep">/\x3C/span><span class="crumb cur">${escHtml(child.name)}\x3C/span>`;
  } else {
    html = `<span class="crumb cur">${escHtml(proj.name)} — All\x3C/span>`;
  }
  el.innerHTML = html;
}

function renderViewTabs() {
  const el = document.getElementById('tb-views');
  if (state.view === 'home' || state.view === 'settings') { el.innerHTML=''; return; }
  const views = [{id:'list',label:'List',icon:'☰'},{id:'gantt',label:'Gantt',icon:'▬'}];
  el.innerHTML = views.map(v=>`
    <div class="view-btn ${state.view===v.id?'active':''}" onclick="switchView('${v.id}')">
      <span>${v.icon}\x3C/span>${v.label}
    \x3C/div>`).join('');
}

function switchView(v) { state.view=v; renderViewTabs(); renderCurrentView(); }

// ═══════════════════════════════════════════════════
// VIEW ROUTING
// ═══════════════════════════════════════════════════
function renderCurrentView() {
  ['home-view','list-view','gantt-view','settings-view'].forEach(id=>{
    document.getElementById(id).style.display='none';
  });
  if (state.view==='home')     { document.getElementById('home-view').style.display='block'; renderHomeView(); }
  if (state.view==='list')     { document.getElementById('list-view').style.display='block'; renderListView(); }
  if (state.view==='gantt')    { document.getElementById('gantt-view').style.display='flex'; }
  if (state.view==='settings') { document.getElementById('settings-view').style.display='block'; renderSettingsView(); }
}

// ═══════════════════════════════════════════════════
// HOME VIEW
// ═══════════════════════════════════════════════════
function renderHomeView() {
  const el = document.getElementById('home-view');
  const projects = sortedProjects();
  const cards = projects.map(proj => {
    const comp = getProjectCompletion(proj._key);
    const children = sortedChildren(proj);
    const typeLabel = PROJECT_TYPES.find(t=>t.id===proj.type)?.label || 'Project';
    return `
      <div class="project-card" onclick="selectProject('${proj._key}')">
        <div style="display:flex;align-items:center;margin-bottom:6px">
          <span class="pc-dot ${proj.color}">\x3C/span>
          <span class="pc-name">${escHtml(proj.name)}\x3C/span>
        \x3C/div>
        <div class="pc-type">${typeLabel}\x3C/div>
        <div class="pc-stats">
          <div class="pc-stat"><span>${children.length}\x3C/span> items\x3C/div>
          <div class="pc-stat"><span>${comp.total}\x3C/span> tasks\x3C/div>
          <div class="pc-stat"><span>${comp.done}\x3C/span> complete\x3C/div>
        \x3C/div>
        <div class="pc-bar-wrap"><div class="pc-bar" style="width:${comp.pct}%">\x3C/div>\x3C/div>
        <div style="font-size:11px;color:var(--text3);margin-top:6px">${comp.pct}% complete\x3C/div>
      \x3C/div>
    `;
  }).join('');

  el.innerHTML = `
    <div class="home-title">Home\x3C/div>
    <div class="home-sub">${projects.length} project${projects.length!==1?'s':''} · Click a card to open\x3C/div>
    <div class="project-cards">${cards || '<div style="color:var(--text3);font-size:13px">No projects yet. Click "+ New Project" to get started.\x3C/div>'}\x3C/div>
  `;
}

// ═══════════════════════════════════════════════════
// LIST VIEW
// ═══════════════════════════════════════════════════
function renderListView() {
  const container = document.getElementById('list-view');
  const proj = state.projects[state.projectId];
  if (!proj) { container.innerHTML=''; return; }

  const phases = sortedPhases(proj);
  const children = state.childId
    ? sortedChildren(proj).filter(c=>c._key===state.childId)
    : sortedChildren(proj);

  let html = `
    <div class="col-headers">
      <div class="col-header">\x3C/div>
      <div class="col-header">Name\x3C/div>
      <div class="col-header">Assignee\x3C/div>
      <div class="col-header">Due Date\x3C/div>
      <div class="col-header">Priority\x3C/div>
      <div class="col-header">Status\x3C/div>
      <div class="col-header">Start Date\x3C/div>
    \x3C/div>
  `;

  if (!state.childId) {
    // All children view
    children.forEach(child => {
      const isExp = state.expandedChildren[child._key] !== false;
      const cc = getChildCompletion(state.projectId, child._key);
      const dotCls = cc.complete&&cc.total>0 ? child.color+' dot-complete' : child.color;
      html += `
        <div class="child-section">
          <div class="child-section-header" onclick="toggleChildExpand('${child._key}')">
            <span class="cs-chevron ${isExp?'open':''}">▶\x3C/span>
            <span class="cr-dot ${dotCls}" style="width:10px;height:10px;flex-shrink:0">\x3C/span>
            <span class="cs-title">${escHtml(child.name)}\x3C/span>
            <span class="cs-count">${countChildTasks(state.projectId,child._key)} tasks\x3C/span>
          \x3C/div>
          ${isExp ? renderChildPhases(state.projectId, proj, child, phases) : ''}
        \x3C/div>
      `;
    });
  } else {
    const child = proj.children?.[state.childId];
    if (child) html += renderChildPhases(state.projectId, proj, child, phases);
  }

  container.innerHTML = html;
}

function renderChildPhases(projId, proj, child, phases) {
  let html = '';
  phases.forEach(phase => {
    const phKey = `${projId}_${child._key}_${phase.id}`;
    const isOpen = state.expandedPhases[phKey] !== false;
    const pTasks = getPhaseTaskList(projId, child._key, phase.id);

    html += `
      <div class="phase-group">
        <div class="phase-header" onclick="togglePhase('${phKey}')">
          <span class="ph-chevron ${isOpen?'open':''}">▶\x3C/span>
          <span class="phase-pill ${phase.color||'pc-0'}">${escHtml(phase.name)}\x3C/span>
          <span class="ph-count">${pTasks.length}\x3C/span>
          <span class="ph-add" onclick="addTask(event,'${projId}','${child._key}','${phase.id}')">+ Add Task\x3C/span>
        \x3C/div>
    `;
    if (isOpen) {
      pTasks.forEach(task => {
        html += renderTaskRow(task, projId, child._key, phase.id, false, null);
        if (task.subtasks && state.expandedTasks[task._key]) {
          Object.entries(task.subtasks).forEach(([sk,sub])=>{
            html += renderTaskRow({...sub,_key:sk}, projId, child._key, phase.id, true, task._key);
          });
        }
      });
      html += `<div class="add-task-row" data-phkey="${phKey}" data-proj="${projId}" data-child="${child._key}" data-phase="${phase.id}" onclick="addTask(event,'${projId}','${child._key}','${phase.id}')">+ Add task\x3C/div>`;
    }
    html += `\x3C/div>`;
  });
  return html;
}

function sortedPhases(proj) {
  if (!proj.phases) return [];
  return Object.values(proj.phases).sort((a,b)=>(a.order??0)-(b.order??0));
}

function getPhaseTaskList(projId, childId, phaseId) {
  const raw = state.tasks?.[projId]?.[childId]?.[phaseId];
  if (!raw || typeof raw!=='object') return [];
  return Object.entries(raw).map(([k,v])=>({...v,_key:k}));
}

// ═══════════════════════════════════════════════════
// TASK ROW
// ═══════════════════════════════════════════════════
function renderTaskRow(task, projId, childId, phaseId, isSubtask, parentId) {
  const hasChildren = !isSubtask && task.subtasks && Object.keys(task.subtasks).length>0;
  const isExpanded = state.expandedTasks[task._key];
  const selKey = isSubtask
    ? `${projId}|${childId}|${phaseId}|${task._key}|${parentId}`
    : `${projId}|${childId}|${phaseId}|${task._key}`;
  const isSelected = state.selectedTasks.has(selKey);
  const statusCls = task.status||'todo';
  const dotCls = statusCls==='complete'?'complete':statusCls==='in-progress'?'in-progress':'todo';
  const assignee = task.assigneeId ? TEAM_MEMBERS.find(m=>m.id===task.assigneeId) : null;
  const priority = task.priority ? PRIORITIES.find(p=>p.value===task.priority) : null;
  const statusObj = STATUSES.find(s=>s.value===statusCls)||STATUSES[0];
  const dueFmt = task.dueDate?formatDate(task.dueDate):'';
  const startFmt = task.startDate?formatDate(task.startDate):'';
  const dueCls = task.dueDate?(isOverdue(task.dueDate)?'overdue':isSoon(task.dueDate)?'soon':''):'empty';
  const pId = isSubtask?parentId:'';

  return `
    <div class="task-row${isSubtask?' subtask':''}${isSelected?' selected':''}" data-task="${task._key}" data-selkey="${escAttr(selKey)}">
      <div class="row-first-col">
        <div class="row-checkbox${isSelected?' checked':''}" onclick="toggleSelect(event,'${escAttr(selKey)}')">${isSelected?'✓':''}\x3C/div>
        ${hasChildren?`<div class="row-expand" onclick="toggleTaskExpand('${task._key}')">${isExpanded?'▾':'▸'}\x3C/div>`:''}
      \x3C/div>
      <div class="task-name-cell${isSubtask?' subtask-indent':''}">
        <div class="task-status-dot ${dotCls}" onclick="cycleStatus('${projId}','${childId}','${phaseId}','${task._key}','${pId}')">\x3C/div>
        <span class="task-name-text" ondblclick="editTaskName(event,'${projId}','${childId}','${phaseId}','${task._key}','${pId}')">${escHtml(task.name||'Untitled')}\x3C/span>
        <span class="task-hover-tools">
          ${!isSubtask?`<span class="hover-tool-btn" title="Add subtask" onclick="addSubtask('${projId}','${childId}','${phaseId}','${task._key}')">⤷\x3C/span>`:''}
          <span class="hover-tool-btn" title="Rename" onclick="editTaskName(event,'${projId}','${childId}','${phaseId}','${task._key}','${pId}')">✎\x3C/span>
          <span class="hover-tool-btn" style="color:var(--red);opacity:.7" title="Delete" onclick="deleteTask('${projId}','${childId}','${phaseId}','${task._key}','${pId}')">🗑\x3C/span>
        \x3C/span>
      \x3C/div>
      <div class="assignee-cell" onclick="openAssigneeDD(event,'${projId}','${childId}','${phaseId}','${task._key}','${pId}')">
        ${assignee?`<div class="avatar" style="background:${assignee.color}">${assignee.initials}\x3C/div>`:`<div class="avatar-empty">+\x3C/div>`}
      \x3C/div>
      <div class="date-cell ${dueCls}" onclick="openDatePicker(event,'${projId}','${childId}','${phaseId}','${task._key}','${pId}','due')">
        ${dueFmt||'<span style="color:var(--text3)">—\x3C/span>'}
      \x3C/div>
      <div class="priority-cell" onclick="openPriorityDD(event,'${projId}','${childId}','${phaseId}','${task._key}','${pId}')">
        ${priority?`<span style="color:${priority.color}">${priority.icon} ${priority.label}\x3C/span>`:`<span style="color:var(--text3)">—\x3C/span>`}
      \x3C/div>
      <div class="status-cell" onclick="openStatusDD(event,'${projId}','${childId}','${phaseId}','${task._key}','${pId}')">
        <span class="status-badge ${statusObj.cls}">${statusObj.label}\x3C/span>
      \x3C/div>
      <div class="date-cell ${task.startDate?'':'empty'}" onclick="openDatePicker(event,'${projId}','${childId}','${phaseId}','${task._key}','${pId}','start')">
        ${startFmt||'<span style="color:var(--text3)">—\x3C/span>'}
      \x3C/div>
    \x3C/div>`;
}

// ═══════════════════════════════════════════════════
// TASK PATH HELPERS
// ═══════════════════════════════════════════════════
function taskPath(projId,childId,phaseId,taskKey,parentKey,field) {
  const base = parentKey
    ? `tasks/${projId}/${childId}/${phaseId}/${parentKey}/subtasks/${taskKey}`
    : `tasks/${projId}/${childId}/${phaseId}/${taskKey}`;
  return field ? `${base}/${field}` : base;
}

function getTaskData(projId,childId,phaseId,taskKey,parentKey) {
  return parentKey
    ? state.tasks?.[projId]?.[childId]?.[phaseId]?.[parentKey]?.subtasks?.[taskKey]
    : state.tasks?.[projId]?.[childId]?.[phaseId]?.[taskKey];
}

// ═══════════════════════════════════════════════════
// TASK CRUD
// ═══════════════════════════════════════════════════
async function addTask(e, projId, childId, phaseId) {
  e.stopPropagation();
  const phKey = `${projId}_${childId}_${phaseId}`;
  const inputId = `nti-${phKey}`;
  if (document.getElementById(inputId)) { document.getElementById(inputId).focus(); return; }
  const addRow = document.querySelector(`.add-task-row[data-phkey="${phKey}"]`);
  if (!addRow) return;

  const newRow = document.createElement('div');
  newRow.className = 'new-task-row';
  newRow.innerHTML = `
    <div>\x3C/div>
    <div style="display:flex;align-items:center;gap:8px;min-width:0">
      <div class="task-status-dot todo" style="flex-shrink:0;pointer-events:none">\x3C/div>
      <input class="new-task-input" id="${inputId}" placeholder="Task name…" autocomplete="off">
    \x3C/div>
    <div style="font-size:11px;color:var(--text3);padding-left:4px">Enter · Esc\x3C/div>`;
  addRow.parentNode.insertBefore(newRow, addRow);
  const input = document.getElementById(inputId);
  input.focus();
  let done=false;
  const save = async()=>{ if(done)return; done=true; const n=input.value.trim(); newRow.remove(); if(!n)return; await fbPush(`tasks/${projId}/${childId}/${phaseId}`,{name:n,status:'todo',createdAt:Date.now()}); toast('Task added'); };
  const cancel = ()=>{ if(done)return; done=true; newRow.remove(); };
  input.addEventListener('keydown',ev=>{ if(ev.key==='Enter'){ev.preventDefault();save();} if(ev.key==='Escape')cancel(); });
  input.addEventListener('blur',()=>setTimeout(save,120));
}

async function addSubtask(projId, childId, phaseId, parentKey) {
  state.expandedTasks[parentKey]=true;
  renderListView();
  const parentRow = document.querySelector(`[data-task="${parentKey}"]`);
  if (!parentRow) return;
  let insertAfter=parentRow, next=parentRow.nextSibling;
  while(next&&next.classList&&next.classList.contains('subtask')){ insertAfter=next; next=next.nextSibling; }
  const inputId=`nsi-${parentKey}`;
  if(document.getElementById(inputId))return;
  const newRow=document.createElement('div');
  newRow.className='new-task-row subtask';
  newRow.style.background='rgba(0,0,0,.2)';
  newRow.innerHTML=`<div>\x3C/div><div style="display:flex;align-items:center;gap:8px;min-width:0;padding-left:24px"><div class="task-status-dot todo" style="flex-shrink:0;pointer-events:none">\x3C/div><input class="new-task-input" id="${inputId}" placeholder="Subtask name…" autocomplete="off">\x3C/div><div style="font-size:11px;color:var(--text3)">Enter · Esc\x3C/div>`;
  insertAfter.parentNode.insertBefore(newRow,insertAfter.nextSibling);
  const input=document.getElementById(inputId); input.focus();
  let done=false;
  const save=async()=>{ if(done)return; done=true; const n=input.value.trim(); newRow.remove(); if(!n)return; await fbPush(`tasks/${projId}/${childId}/${phaseId}/${parentKey}/subtasks`,{name:n,status:'todo',createdAt:Date.now()}); toast('Subtask added'); };
  const cancel=()=>{ if(done)return; done=true; newRow.remove(); };
  input.addEventListener('keydown',ev=>{ if(ev.key==='Enter'){ev.preventDefault();save();} if(ev.key==='Escape')cancel(); });
  input.addEventListener('blur',()=>setTimeout(save,120));
}

function editTaskName(e, projId, childId, phaseId, taskKey, parentKey) {
  e.stopPropagation();
  const row = document.querySelector(`.task-row[data-task="${taskKey}"]`);
  if (!row) return;
  const nameSpan = row.querySelector('.task-name-text');
  if (!nameSpan||row.querySelector('.task-name-input')) return;
  const currentName = nameSpan.textContent.trim();
  const input = document.createElement('input');
  input.className='task-name-input'; input.value=currentName;
  nameSpan.replaceWith(input); input.focus();
  input.setSelectionRange(input.value.length,input.value.length);
  let saved=false;
  const save=async()=>{
    if(saved)return; saved=true;
    const val=input.value.trim();
    const restored=document.createElement('span');
    restored.className='task-name-text'; restored.textContent=val||currentName;
    input.replaceWith(restored);
    if(val&&val!==currentName) await fbSet(taskPath(projId,childId,phaseId,taskKey,parentKey,'name'),val);
  };
  input.addEventListener('blur',save);
  input.addEventListener('keydown',ev=>{ if(ev.key==='Enter'){ev.preventDefault();input.blur();} if(ev.key==='Escape'){input.value=currentName;input.blur();} });
}

async function cycleStatus(projId,childId,phaseId,taskKey,parentKey) {
  const order=['todo','in-progress','complete'];
  const d=getTaskData(projId,childId,phaseId,taskKey,parentKey);
  if(!d)return;
  const next=order[(order.indexOf(d.status||'todo')+1)%order.length];
  await fbSet(taskPath(projId,childId,phaseId,taskKey,parentKey,'status'),next);
}

async function deleteTask(projId,childId,phaseId,taskKey,parentKey) {
  if(!confirm('Delete this task?'))return;
  await fbRemove(taskPath(projId,childId,phaseId,taskKey,parentKey));
  const selKey=parentKey
    ?`${projId}|${childId}|${phaseId}|${taskKey}|${parentKey}`
    :`${projId}|${childId}|${phaseId}|${taskKey}`;
  state.selectedTasks.delete(selKey); updateActionBar(); toast('Deleted');
}

// ═══════════════════════════════════════════════════
// TOGGLE EXPAND
// ═══════════════════════════════════════════════════
function toggleChildExpand(cKey){ state.expandedChildren[cKey]=state.expandedChildren[cKey]===false?true:false; renderListView(); }

function openDatePicker(e,projId,childId,phaseId,taskKey,parentKey,field) {
  e.stopPropagation(); closeDropdown();
  const dbField=field==='due'?'dueDate':'startDate';
  const rect=e.currentTarget.getBoundingClientRect();
  const overlay=document.createElement('div'); overlay.className='dropdown-overlay'; overlay.onclick=closeDropdown;
  const menu=document.createElement('div'); menu.className='dropdown-menu';
  menu.style.top=`${Math.min(rect.bottom+4,window.innerHeight-160)}px`;
  menu.style.left=`${rect.left}px`; menu.style.minWidth='200px'; menu.style.padding='10px';
  menu.onclick=ev=>ev.stopPropagation();
  const lbl=document.createElement('div'); lbl.style.cssText='font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px'; lbl.textContent=field==='due'?'Due Date':'Start Date';
  const input=document.createElement('input'); input.type='date';
  input.style.cssText='background:var(--surface3);border:1px solid var(--border2);color:var(--text);padding:6px 10px;border-radius:5px;font-family:inherit;font-size:13px;width:100%;display:block;margin-bottom:8px';
  const d=getTaskData(projId,childId,phaseId,taskKey,parentKey); if(d&&d[dbField])input.value=d[dbField];
  const btnRow=document.createElement('div'); btnRow.style.cssText='display:flex;gap:6px;justify-content:flex-end';
  const clr=document.createElement('button'); clr.className='btn btn-ghost'; clr.style.cssText='font-size:11px;padding:4px 10px'; clr.textContent='Clear';
  clr.onclick=async()=>{ await fbRemove(taskPath(projId,childId,phaseId,taskKey,parentKey,dbField)); closeDropdown(); };
  const sav=document.createElement('button'); sav.className='btn btn-primary'; sav.style.cssText='font-size:11px;padding:4px 10px'; sav.textContent='Set Date';
  sav.onclick=async()=>{
    if(!input.value){closeDropdown();return;}
    await fbSet(taskPath(projId,childId,phaseId,taskKey,parentKey,dbField),input.value);
    // Sync: if this is a due date on a "Release Day" task, update child releaseDate
    if(dbField==='dueDate' && !parentKey) {
      const taskData = getTaskData(projId,childId,phaseId,taskKey,null);

        await fbSet(`projects/${projId}/children/${childId}/releaseDate`, input.value);

  };

  activeDropdown=overlay; setTimeout(()=>input.focus(),50);
}

function showDropdown(e, items, onSelect) {

function renderReleaseDateBadge(dateStr) {
  if (!dateStr) return '';
  const now = new Date();
  const rel = new Date(dateStr + 'T00:00:00');
  const diff = rel - now;
  const diffDays = Math.ceil(diff / 86400000);
  const label = rel.toLocaleDateString('en-US', {month:'short', day:'numeric'});
  if (diff < 0) {
    // Already released — muted
    return `<span class="cr-date out">${label}\x3C/span>`;
  } else if (diffDays <= 7) {
    // Within 7 days — amber warning
    return `<span class="cr-date soon">🔔 ${label}\x3C/span>`;
  } else {
    return `<span class="cr-date upcoming">${label}\x3C/span>`;
  }
}

// COMPLETION
// ═══════════════════════════════════════════════════
function getChildCompletion(projId, childId) {
  const proj=state.projects[projId]; if(!proj)return{total:0,done:0,pct:0,complete:false};
  const phases=sortedPhases(proj);
  let total=0,done=0;
  phases.forEach(ph=>{
    const tasks=getPhaseTaskList(projId,childId,ph.id);
    tasks.forEach(t=>{
      total++; if(t.status==='complete')done++;
      if(t.subtasks)Object.values(t.subtasks).forEach(s=>{ total++; if(s.status==='complete')done++; });
    });
  });
  return{total,done,pct:total>0?Math.round(done/total*100):0,complete:total>0&&done===total};
}

function getProjectCompletion(projId) {
  const proj=state.projects[projId]; if(!proj)return{total:0,done:0,pct:0};
  const children=sortedChildren(proj);
  let total=0,done=0;
  children.forEach(c=>{ const cc=getChildCompletion(projId,c._key); total+=cc.total; done+=cc.done; });
  return{total,done,pct:total>0?Math.round(done/total*100):0};
}

function countChildTasks(projId,childId) {
  const proj=state.projects[projId]; if(!proj)return 0;
  return sortedPhases(proj).reduce((acc,ph)=>acc+getPhaseTaskList(projId,childId,ph.id).length,0);
}

function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s){ return String(s||'').replace(/"/g,'&quot;'); }
function formatDate(d){ if(!d)return''; const dt=new Date(d+'T00:00:00'); return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function isOverdue(d){ return d&&new Date(d+'T23:59:59')<new Date(); }
function isSoon(d){ if(!d)return false; const dt=new Date(d+'T23:59:59'),now=new Date(); return dt>=now&&dt<=new Date(now.getTime()+7*86400000); }
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2200); }

let notesState = {
  open: false,
  notes: {},        // live from firebase
  activeId: null,
  saveTimer: null,
};

function toggleNotes() {
  notesState.open = !notesState.open;
  document.getElementById('notes-panel').classList.toggle('open', notesState.open);
  document.getElementById('notes-fab').classList.toggle('active', notesState.open);
}

function initNotes() {
  fbListen('notes', data => {
    notesState.notes = data || {};
    renderNotesList();
    // If active note was deleted externally, clear editor
    if (notesState.activeId && !notesState.notes[notesState.activeId]) {
      notesState.activeId = null;
      renderNotesEditor();
    }
  });
}

function sortedNotes() {
  return Object.entries(notesState.notes)
    .map(([k,v]) => ({...v, _key:k}))
    .sort((a,b) => (b.updatedAt||0) - (a.updatedAt||0));
}

function renderNotesList() {
  const el = document.getElementById('notes-list');
  if (!el) return;
  const notes = sortedNotes();
  if (notes.length === 0) {
    el.innerHTML = `<div class="notes-empty-list">No notes yet.<br>Click <strong>+ New Note\x3C/trong><br>to get started.\x3C/div>`;
    return;
  }
  el.innerHTML = notes.map(n => {
    const isActive = n._key === notesState.activeId;
    // Strip HTML tags for preview
    const tmp = document.createElement('div');
    tmp.innerHTML = n.body || '';
    const preview = (tmp.textContent || tmp.innerText || '').replace(/\s+/g,' ').trim() || 'No content';
    const dateStr = n.updatedAt ? formatNoteDate(n.updatedAt) : '';
    return `
      <div class="note-list-item ${isActive?'active':''}" onclick="selectNote('${n._key}')">
        <div class="nli-title">${escHtml(n.title||'Untitled')}\x3C/div>
        <div class="nli-preview">${escHtml(preview.slice(0,50))}\x3C/div>
        <div class="nli-date">${dateStr}\x3C/div>
        <div class="nli-delete" onclick="deleteNote(event,'${n._key}')">🗑\x3C/div>
      \x3C/div>`;
  }).join('');
}

function renderNotesEditor() {
  const el = document.getElementById('notes-editor');
  if (!el) return;
  if (!notesState.activeId || !notesState.notes[notesState.activeId]) {
    el.innerHTML = `
      <div class="notes-editor-empty">
        <div class="ne-icon">📝\x3C/div>
        <div class="ne-text">Select a note or create one\x3C/div>
      \x3C/div>`;
    return;
  }
  const note = notesState.notes[notesState.activeId];
  el.innerHTML = `
    <input class="note-title-input" id="note-title" value="${escAttr(note.title||'')}" placeholder="Title" oninput="scheduleNoteSave()">
    <div class="note-meta">
      <span id="note-meta-date">${formatNoteDate(note.updatedAt||Date.now())}\x3C/span>

    \x3C/div>
    <div class="note-toolbar" id="note-toolbar">
      <select class="tb-select" onchange="noteFormat('formatBlock',this.value);this.value=''">
        <option value="" disabled selected>Style\x3C/option>
        <option value="p">Body\x3C/option>
        <option value="h1">Heading 1\x3C/option>
        <option value="h2">Heading 2\x3C/option>
        <option value="h3">Heading 3\x3C/option>
        <option value="blockquote">Quote\x3C/option>
      \x3C/select>
      <div class="tb-sep">\x3C/div>

      <button class="tb-btn italic"  title="Italic (⌘I)"      onclick="noteFormat('italic')"><i>I</>\x3C/button>
      <button class="tb-btn underline" title="Underline (⌘U)" onclick="noteFormat('underline')"><u>U</>\x3C/button>
      <button class="tb-btn strike"  title="Strikethrough"    onclick="noteFormat('strikeThrough')"><s>S</>\x3C/button>
      <div class="tb-sep">\x3C/div>
      <button class="tb-btn" title="Bullet list"     onclick="noteFormat('insertUnorderedList')" style="font-size:15px">≡\x3C/button>
      <button class="tb-btn" title="Numbered list"   onclick="noteFormat('insertOrderedList')"   style="font-size:13px">1.\x3C/button>
      <button class="tb-btn" title="Checklist"       onclick="insertChecklist()"                 style="font-size:13px">☑\x3C/button>
      <div class="tb-sep">\x3C/div>
      <button class="tb-btn" title="Indent"          onclick="noteFormat('indent')"              style="font-size:14px">→\x3C/button>
      <button class="tb-btn" title="Outdent"         onclick="noteFormat('outdent')"             style="font-size:14px">←\x3C/button>
      <div class="tb-sep">\x3C/div>
      <button class="tb-btn" title="Divider"         onclick="noteFormat('insertHorizontalRule')" style="font-size:12px">—\x3C/button>
      <button class="tb-btn" title="Clear formatting" onclick="noteFormat('removeFormat')"        style="font-size:11px">Tx\x3C/button>
    \x3C/div>
    <div class="note-rich-body" id="note-body" contenteditable="true"
      data-placeholder="Start writing…"
      oninput="scheduleNoteSave()"
      onkeydown="handleEditorKey(event)"
    >${note.body||''}\x3C/div>
    <div class="note-save-indicator" id="note-save-ind">\x3C/div>`;

  const body = document.getElementById('note-body');
  // Strip inline color/background styles injected by execCommand
  const observer = new MutationObserver(() => {
    body.querySelectorAll('[style*="color"],[style*="background"]').forEach(el => {
      el.style.removeProperty('color');
      el.style.removeProperty('background-color');
      el.style.removeProperty('background');
      if (!el.getAttribute('style')) el.removeAttribute('style');
    });
  });
  observer.observe(body, {childList:true, subtree:true, attributes:true, attributeFilter:['style']});
  // Store observer so we can disconnect on note switch
  notesState.observer = observer;

  // Update toolbar active states on selection change
  body.addEventListener('keyup', updateToolbarState);
  body.addEventListener('mouseup', updateToolbarState);

  if (!note.title || note.title === 'Untitled') {
    setTimeout(() => document.getElementById('note-title')?.focus(), 50);
  } else {
    setTimeout(() => body?.focus(), 50);
  }
}

function noteFormat(cmd, val) {
  document.getElementById('note-body')?.focus();
  document.execCommand(cmd, false, val || null);
  updateToolbarState();
  scheduleNoteSave();
}

function insertChecklist() {
  const body = document.getElementById('note-body');
  if (!body) return;
  body.focus();

  const sel = window.getSelection();
  const hasSelection = sel && !sel.isCollapsed;

  if (!hasSelection) {
    // No selection — insert a single blank checklist item via DOM
    insertChecklistDOM([{text:'', depth:0}]);
    scheduleNoteSave();
    return;
  }

  const range = sel.getRangeAt(0);
  const selectedText = range.toString();

  // Split selected text into lines and strip leading dash/bullet chars
  const rawLines = selectedText.split(/\n/);
  const lines = [];
  rawLines.forEach(line => {
    const trimmed = line.trimStart();
    if (!trimmed) return;
    // Measure indent depth by leading whitespace
    const leadingSpaces = line.length - trimmed.length;
    const depth = Math.floor(leadingSpaces / 2); // every 2 spaces = 1 indent level
    // Strip leading dash, bullet, asterisk, numbered list markers
    const cleaned = trimmed.replace(/^[-–—•*]\s*/, '').replace(/^\d+[.)]\s*/, '').trim();
    if (cleaned) lines.push({ text: cleaned, depth });
  });

  if (lines.length === 0) {
    insertChecklistDOM([{text:'', depth:0}]);
    scheduleNoteSave();
    return;
  }

  // Delete selection and insert checklist using DOM (preserves undo stack)
  range.deleteContents();
  insertChecklistDOM(lines, range);
  scheduleNoteSave();
}

function insertChecklistDOM(lines, range) {
  const body = document.getElementById('note-body');
  if (!body) return;

  const cbClick = `this.parentElement.classList.toggle('checked',this.checked);scheduleNoteSave()`;
  const ul = document.createElement('ul');
  ul.className = 'checklist';

  lines.forEach(item => {
    const text  = typeof item === 'string' ? item : item.text;
    const depth = typeof item === 'object' ? (item.depth || 0) : 0;
    const li = document.createElement('li');
    if (depth > 0) li.style.paddingLeft = `${depth * 20}px`;
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.setAttribute('onclick', cbClick);
    li.appendChild(cb);
    li.appendChild(document.createTextNode(' ' + text));
    ul.appendChild(li);
  });

  if (range) {
    // Insert at the current range position
    range.insertNode(ul);
    // Move cursor after the inserted list
    const newRange = document.createRange();
    newRange.setStartAfter(ul);
    newRange.collapse(true);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(newRange);
  } else {
    // Insert at cursor via execCommand to keep undo working
    // Serialize the ul to HTML and use insertHTML as fallback
    const tmp = document.createElement('div');
    tmp.appendChild(ul);
    document.execCommand('insertHTML', false, tmp.innerHTML);
  }
}

function buildChecklistHTML(lines) {
  // Keep for any legacy callers — delegates to DOM version
  const cbClick = `this.parentElement.classList.toggle('checked',this.checked);scheduleNoteSave()`;
  let html = `<ul class="checklist">`;
  lines.forEach(item => {
    const text  = typeof item === 'string' ? item : item.text;
    const depth = typeof item === 'object' ? (item.depth || 0) : 0;
    const indent = depth > 0 ? ` style="padding-left:${depth * 20}px"` : '';
    html += `<li${indent}><input type="checkbox" onclick="${cbClick}"> ${escHtml(text)}\x3C/li>`;
  });
  html += `\x3C/ul>`;
  return html;
}

function handleEditorKey(e) {
  // Tab → indent/outdent
  if (e.key === 'Tab') {
    e.preventDefault();
    document.execCommand(e.shiftKey ? 'outdent' : 'indent');
    return;
  }

  // Enter — strip italic/underline/strike carried forward from previous line
  if (e.key === 'Enter' && !e.shiftKey) {
    // Let the browser insert the new line first, then clean up
    setTimeout(() => {
      // Remove italic if it was inherited (not explicitly re-applied)
      if (document.queryCommandState('italic'))     document.execCommand('italic',     false, null);
      if (document.queryCommandState('underline'))  document.execCommand('underline',  false, null);
      if (document.queryCommandState('strikeThrough')) document.execCommand('strikeThrough', false, null);
      // Strip any inline font/color styles on the new caret element
      const sel = window.getSelection();
      if (sel && sel.anchorNode) {
        let node = sel.anchorNode.nodeType === 3 ? sel.anchorNode.parentElement : sel.anchorNode;
        // Walk up to clean inline spans injected by the browser
        while (node && node.id !== 'note-body') {
          if (node.tagName === 'SPAN' && node.style && node.style.cssText) {
            node.style.removeProperty('font-style');
            node.style.removeProperty('text-decoration');
            node.style.removeProperty('color');
            node.style.removeProperty('background-color');
            if (!node.getAttribute('style')) node.removeAttribute('style');
          }
          node = node.parentElement;
        }
      }
      updateToolbarState();
      scheduleNoteSave();
    }, 0);
    return;
  }

  // Cmd/Ctrl + B/I/U — update toolbar state after browser handles it
  if ((e.metaKey || e.ctrlKey) && ['b','i','u'].includes(e.key.toLowerCase())) {
    setTimeout(updateToolbarState, 10);
  }
}

function updateToolbarState() {
  const cmds = {
    'bold':'bold', 'italic':'italic', 'underline':'underline', 'strikeThrough':'strike'
  };
  Object.entries(cmds).forEach(([cmd, cls]) => {
    const btn = document.querySelector(`.tb-btn.${cls}`);
    if (btn) btn.classList.toggle('active', document.queryCommandState(cmd));
  });
}

async function newNote() {
  await flushNoteSave(); // save current before switching
  const id = await fbPush('notes', {
    title: 'Untitled',
    body: '',
    createdAt: Date.now(),
    updatedAt: Date.now(),
  });
  notesState.activeId = id;
  renderNotesList();
  renderNotesEditor();
}

function selectNote(id) {
  if (notesState.observer) { notesState.observer.disconnect(); notesState.observer = null; }
  flushNoteSave();
  notesState.activeId = id;
  renderNotesList();
  renderNotesEditor();
}

async function deleteNote(e, id) {
  e.stopPropagation();
  if (!confirm('Delete this note?')) return;
  await fbRemove(`notes/${id}`);
  if (notesState.activeId === id) {
    notesState.activeId = null;
    renderNotesEditor();
  }
  toast('Note deleted');
}

function scheduleNoteSave() {
  const ind = document.getElementById('note-save-ind');
  if (ind) ind.textContent = 'Saving…';
  clearTimeout(notesState.saveTimer);
  notesState.saveTimer = setTimeout(flushNoteSave, 900);
}

async function flushNoteSave() {
  clearTimeout(notesState.saveTimer);
  if (!notesState.activeId) return;
  const titleEl = document.getElementById('note-title');
  const bodyEl  = document.getElementById('note-body');
  if (!titleEl || !bodyEl) return;
  const title = titleEl.value.trim() || 'Untitled';
  const body  = bodyEl.innerHTML;
  await fbUpdate(`notes/${notesState.activeId}`, { title, body, updatedAt: Date.now() });
  const ind = document.getElementById('note-save-ind');
  if (ind) { ind.textContent = 'Saved'; setTimeout(()=>{ if(ind)ind.textContent=''; }, 1600); }
  // Refresh meta date
  const metaDate = document.getElementById('note-meta-date');
  if (metaDate) metaDate.textContent = 'Just now';
}

function formatNoteDate(ts) {
  if (!ts) return '';
  const d = new Date(ts), now = new Date(), diff = now - d;
  if (diff < 60000)    return 'Just now';
  if (diff < 3600000)  return `${Math.floor(diff/60000)}m ago`;
  if (diff < 86400000) return `${Math.floor(diff/3600000)}h ago`;
  return d.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
}
