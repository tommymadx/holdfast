function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s){ return String(s||'').replace(/"/g,'&quot;'); }
function formatDate(d){ if(!d)return''; const dt=new Date(d+'T00:00:00'); return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function isOverdue(d){ return d&&new Date(d+'T23:59:59')<new Date(); }
function isSoon(d){ if(!d)return false; const dt=new Date(d+'T23:59:59'),now=new Date(); return dt>=now&&dt<=new Date(now.getTime()+7*86400000); }
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2200); }

// ═══════════════════════════════════════════════════
// NOTES
// ═══════════════════════════════════════════════════
let notesState = {
  open: false,
  notes: {},        // live from firebase
  activeId: null,
  saveTimer: null,
};

function toggleNotes() {
  notesState.open = !notesState.open;
  document.getElementById('notes-panel').classList.toggle('open', notesState.open);
  document.getElementById('notes-fab').classList.toggle('active', notesState.open);
}

function initNotes() {
  fbListen('notes', data => {
    notesState.notes = data || {};
    renderNotesList();
    // If active note was deleted externally, clear editor
    if (notesState.activeId && !notesState.notes[notesState.activeId]) {
      notesState.activeId = null;
      renderNotesEditor();
    }
  });
}

function sortedNotes() {
  return Object.entries(notesState.notes)
    .map(([k,v]) => ({...v, _key:k}))
    .sort((a,b) => (b.updatedAt||0) - (a.updatedAt||0));
}

function renderNotesList() {
  const el = document.getElementById('notes-list');
  if (!el) return;
  const notes = sortedNotes();
  if (notes.length === 0) {
    el.innerHTML = `<div class="notes-empty-list">No notes yet.<br>Click <strong>+ New Note</strong><br>to get started.</div>`;
    return;
  }
  el.innerHTML = notes.map(n => {
    const isActive = n._key === notesState.activeId;
    // Strip HTML tags for preview
    const tmp = document.createElement('div');
    tmp.innerHTML = n.body || '';
    const preview = (tmp.textContent || tmp.innerText || '').replace(/\s+/g,' ').trim() || 'No content';
    const dateStr = n.updatedAt ? formatNoteDate(n.updatedAt) : '';
    return `
      <div class="note-list-item ${isActive?'active':''}" onclick="selectNote('${n._key}')" oncontextmenu="noteContextMenu(event,'${n._key}')">
        <div class="nli-title">${escHtml(n.title||'Untitled')}</div>
        <div class="nli-preview">${escHtml(preview.slice(0,50))}</div>
        <div class="nli-date">${dateStr}</div>
      </div>`;
  }).join('');
}

function renderNotesEditor() {
  const el = document.getElementById('notes-editor');
  if (!el) return;
  if (!notesState.activeId || !notesState.notes[notesState.activeId]) {
    el.innerHTML = `
      <div class="notes-editor-empty">
        <div class="ne-icon">📝</div>
        <div class="ne-text">Select a note or create one</div>
      </div>`;
    return;
  }
  const note = notesState.notes[notesState.activeId];
  el.innerHTML = `
    <input class="note-title-input" id="note-title" value="${escAttr(note.title||'')}" placeholder="Title" oninput="scheduleNoteSave()">
    <div class="note-meta">
      <span id="note-meta-date">${formatNoteDate(note.updatedAt||Date.now())}</span>
      ${note.updatedBy?`<span>· ${escHtml(note.updatedBy)}</span>`:''}
    </div>
    <div class="note-toolbar" id="note-toolbar">
      <select class="tb-select" onchange="noteFormat('formatBlock',this.value);this.value=''">
        <option value="" disabled selected>Style</option>
        <option value="p">Body</option>
        <option value="h1">Heading 1</option>
        <option value="h2">Heading 2</option>
        <option value="h3">Heading 3</option>
        <option value="blockquote">Quote</option>
      </select>
      <div class="tb-sep"></div>
      <button class="tb-btn bold"    title="Bold (⌘B)"        onmousedown="e=>e.preventDefault()" onclick="noteFormat('bold')"><b>B</b></button>
      <button class="tb-btn italic"  title="Italic (⌘I)"      onclick="noteFormat('italic')"><i>I</i></button>
      <button class="tb-btn underline" title="Underline (⌘U)" onclick="noteFormat('underline')"><u>U</u></button>
      <button class="tb-btn strike"  title="Strikethrough"    onclick="noteFormat('strikeThrough')"><s>S</s></button>
      <div class="tb-sep"></div>
      <button class="tb-btn" title="Bullet list"     onclick="noteFormat('insertUnorderedList')" style="font-size:15px">≡</button>
      <button class="tb-btn" title="Numbered list"   onclick="noteFormat('insertOrderedList')"   style="font-size:13px">1.</button>

      <div class="tb-sep"></div>
      <button class="tb-btn" title="Indent"          onclick="noteFormat('indent')"              style="font-size:14px">→</button>
      <button class="tb-btn" title="Outdent"         onclick="noteFormat('outdent')"             style="font-size:14px">←</button>
      <div class="tb-sep"></div>
      <button class="tb-btn" title="Divider"         onclick="noteFormat('insertHorizontalRule')" style="font-size:12px">—</button>
      <button class="tb-btn" title="Clear formatting" onclick="noteFormat('removeFormat')"        style="font-size:11px">Tx</button>
    </div>
    <div class="note-rich-body" id="note-body" contenteditable="true"
      data-placeholder="Start writing…"
      oninput="scheduleNoteSave()"
      onkeydown="handleEditorKey(event)"
    >${note.body||''}</div>
    <div class="note-save-indicator" id="note-save-ind"></div>`;

  const body = document.getElementById('note-body');

  // Strip inline color/background styles injected by execCommand
  const observer = new MutationObserver(() => {
    body.querySelectorAll('[style*="color"],[style*="background"]').forEach(el => {
      el.style.removeProperty('color');
      el.style.removeProperty('background-color');
      el.style.removeProperty('background');
      if (!el.getAttribute('style')) el.removeAttribute('style');
    });
  });
  observer.observe(body, {childList:true, subtree:true, attributes:true, attributeFilter:['style']});
  // Store observer so we can disconnect on note switch
  notesState.observer = observer;

  // Update toolbar active states on selection change
  body.addEventListener('keyup', updateToolbarState);
  body.addEventListener('mouseup', updateToolbarState);

  if (!note.title || note.title === 'Untitled') {
    setTimeout(() => document.getElementById('note-title')?.focus(), 50);
  } else {
    setTimeout(() => body?.focus(), 50);
  }
}

function noteFormat(cmd, val) {
  document.getElementById('note-body')?.focus();
  document.execCommand(cmd, false, val || null);
  updateToolbarState();
  scheduleNoteSave();
}

function handleEditorKey(e) {
  // Tab → indent/outdent
  if (e.key === 'Tab') {
    e.preventDefault();
    document.execCommand(e.shiftKey ? 'outdent' : 'indent');
    return;
  }

  // Enter — strip formatting carried from previous line
  if (e.key === 'Enter' && !e.shiftKey) {
    setTimeout(() => {
      if (document.queryCommandState('italic'))        document.execCommand('italic',        false, null);
      if (document.queryCommandState('underline'))     document.execCommand('underline',     false, null);
      if (document.queryCommandState('strikeThrough')) document.execCommand('strikeThrough', false, null);
      updateToolbarState();
      scheduleNoteSave();
    }, 0);
    return;
  }

  if ((e.metaKey || e.ctrlKey) && ['b','i','u'].includes(e.key.toLowerCase())) {
    setTimeout(updateToolbarState, 10);
  }
}

function updateToolbarState() {
  const cmds = {
    'bold':'bold', 'italic':'italic', 'underline':'underline', 'strikeThrough':'strike'
  };
  Object.entries(cmds).forEach(([cmd, cls]) => {
    const btn = document.querySelector(`.tb-btn.${cls}`);
    if (btn) btn.classList.toggle('active', document.queryCommandState(cmd));
  });
}

async function newNote() {
  await flushNoteSave(); // save current before switching
  const id = await fbPush('notes', {
    title: 'Untitled',
    body: '',
    createdAt: Date.now(),
    updatedAt: Date.now(),
  });
  notesState.activeId = id;
  renderNotesList();
  renderNotesEditor();
}

function selectNote(id) {
  if (notesState.observer) { notesState.observer.disconnect(); notesState.observer = null; }
  flushNoteSave();
  notesState.activeId = id;
  renderNotesList();
  renderNotesEditor();
}

function noteContextMenu(e, id) {
  e.preventDefault();
  e.stopPropagation();
  // Remove any existing context menu
  document.querySelector('.note-ctx-menu')?.remove();
  const menu = document.createElement('div');
  menu.className = 'note-ctx-menu';
  menu.innerHTML = `<div class="note-ctx-item" id="note-ctx-delete">🗑 Delete Note</div>`;
  menu.style.left = e.clientX + 'px';
  menu.style.top  = e.clientY + 'px';
  document.body.appendChild(menu);
  menu.querySelector('#note-ctx-delete').addEventListener('click', () => {
    menu.remove();
    deleteNote(id);
  });
  // Click anywhere else closes it
  const close = ev => { if (!menu.contains(ev.target)) { menu.remove(); document.removeEventListener('mousedown', close); } };
  setTimeout(() => document.addEventListener('mousedown', close), 0);
}

async function deleteNote(id) {
  if (!confirm('Delete this note?')) return;
  await fbRemove(`notes/${id}`);
  if (notesState.activeId === id) {
    notesState.activeId = null;
    renderNotesEditor();
  }
  toast('Note deleted');
}

function scheduleNoteSave() {
  const ind = document.getElementById('note-save-ind');
  if (ind) ind.textContent = 'Saving…';
  clearTimeout(notesState.saveTimer);
  notesState.saveTimer = setTimeout(flushNoteSave, 900);
}

async function flushNoteSave() {
  clearTimeout(notesState.saveTimer);
  if (!notesState.activeId) return;
  const titleEl = document.getElementById('note-title');
  const bodyEl  = document.getElementById('note-body');
  if (!titleEl || !bodyEl) return;
  const title = titleEl.value.trim() || 'Untitled';
  const body  = bodyEl.innerHTML;
  await fbUpdate(`notes/${notesState.activeId}`, { title, body, updatedAt: Date.now() });
  const ind = document.getElementById('note-save-ind');
  if (ind) { ind.textContent = 'Saved'; setTimeout(()=>{ if(ind)ind.textContent=''; }, 1600); }
  // Refresh meta date
  const metaDate = document.getElementById('note-meta-date');
  if (metaDate) metaDate.textContent = 'Just now';
}

function formatNoteDate(ts) {
  if (!ts) return '';
  const d = new Date(ts), now = new Date(), diff = now - d;
  if (diff < 60000)    return 'Just now';
  if (diff < 3600000)  return `${Math.floor(diff/60000)}m ago`;
  if (diff < 86400000) return `${Math.floor(diff/3600000)}h ago`;
  return d.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
}


// ═══════════════════════════════════════════════════
// SELECTION → TASK IMPORT
// ═══════════════════════════════════════════════════
let timState = {
  mode: 'group',
  lines: [],
  groupProjId: null,
  groupChildId: null,
  groupPhaseId: null,
};

function initSelectionWatcher() {
  document.addEventListener('selectionchange', () => {
    const body = document.getElementById('note-body');
    if (!body) { hideSelBtn(); return; }
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed || !body.contains(sel.anchorNode)) { hideSelBtn(); return; }
    if (!sel.toString().trim()) { hideSelBtn(); return; }
    showSelBtn(sel);
  });
}

function showSelBtn(sel) {
  const btn = document.getElementById('sel-to-task-btn');
  if (!btn) return;
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  const btnW = 150;
  let left = rect.left + (rect.width / 2) - (btnW / 2);
  left = Math.max(8, Math.min(left, window.innerWidth - btnW - 8));
  btn.style.left = left + 'px';
  btn.style.top = Math.max(8, rect.top - 44) + 'px';
  btn.classList.add('visible');
}

function hideSelBtn() {
  const btn = document.getElementById('sel-to-task-btn');
  if (btn) btn.classList.remove('visible');
}

function openTaskImport() {
  hideSelBtn();
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const text = sel.toString();
  sel.removeAllRanges();

  timState.lines = [];
  text.split('\n').forEach(line => {
    if (!line.trim()) return;
    const leadSpaces = line.length - line.trimStart().length;
    const depth = Math.floor(leadSpaces / 2);
    const cleaned = line.trim()
      .replace(/^[-\u2013\u2014\u2022*\u25b8\u25b6\u203a\u00bb]\s*/, '')
      .replace(/^\d+[.)]\s*/, '')
      .replace(/^\[[ x]\]\s*/i, '')
      .trim();
    if (!cleaned) return;
    timState.lines.push({
      text: cleaned, included: true, name: cleaned, depth,
      projId: timState.groupProjId,
      childId: timState.groupChildId,
      phaseId: timState.groupPhaseId,
    });
  });

  if (!timState.lines.length) { toast('No text lines found'); return; }

  if (!timState.groupProjId) {
    const first = sortedProjects()[0];
    if (first) {
      timState.groupProjId = first._key;
      const firstChild = sortedChildren(first)[0];
      timState.groupChildId = firstChild ? firstChild._key : null;
      const firstPhase = sortedPhases(first)[0];
      timState.groupPhaseId = firstPhase ? phaseKey(firstPhase) : null;
    }
  } else {
    // Re-validate childId and phaseId still exist in the selected project
    const proj = state.projects[timState.groupProjId];
    if (proj) {
      const children = sortedChildren(proj);
      const phases = sortedPhases(proj);
      if (!children.find(c => c._key === timState.groupChildId)) {
        timState.groupChildId = children[0] ? children[0]._key : null;
      }
      if (!phases.find(p => phaseKey(p) === timState.groupPhaseId)) {
        timState.groupPhaseId = phases[0] ? phaseKey(phases[0]) : null;
      }
    }
  }
  timState.lines.forEach(l => {
    if (!l.projId)  l.projId  = timState.groupProjId;
    if (!l.childId) l.childId = timState.groupChildId;
    if (!l.phaseId) l.phaseId = timState.groupPhaseId;
  });

  buildTaskImportModal();
}

function buildTaskImportModal() {
  document.querySelector('.tim-overlay')?.remove();

  const overlay = document.createElement('div');
  overlay.className = 'tim-overlay';
  overlay.addEventListener('click', e => { if (e.target === overlay) closeTaskImport(); });

  const modal = document.createElement('div');
  modal.className = 'tim-modal';

  // Header
  const header = document.createElement('div');
  header.className = 'tim-header';
  const title = document.createElement('span');
  title.className = 'tim-title';
  title.textContent = 'Add to Tasks';
  const closeBtn = document.createElement('div');
  closeBtn.className = 'tim-close';
  closeBtn.textContent = '\u2715';
  closeBtn.addEventListener('click', closeTaskImport);
  header.append(title, closeBtn);

  // Body
  const body = document.createElement('div');
  body.className = 'tim-body';

  // Mode toggle
  const modeLbl = document.createElement('div');
  modeLbl.className = 'tim-lbl';
  modeLbl.textContent = 'Assignment Mode';
  modeLbl.style.marginBottom = '6px';

  const modeRow = document.createElement('div');
  modeRow.className = 'tim-mode';

  const btnGroup = document.createElement('button');
  btnGroup.className = 'tim-mode-btn' + (timState.mode === 'group' ? ' active' : '');
  btnGroup.textContent = 'Group \u2014 same destination for all';
  btnGroup.addEventListener('click', () => { timState.mode = 'group'; buildTaskImportModal(); });

  const btnIndiv = document.createElement('button');
  btnIndiv.className = 'tim-mode-btn' + (timState.mode === 'individual' ? ' active' : '');
  btnIndiv.textContent = 'Individual \u2014 assign each separately';
  btnIndiv.addEventListener('click', () => { timState.mode = 'individual'; buildTaskImportModal(); });

  modeRow.append(btnGroup, btnIndiv);
  body.append(modeLbl, modeRow);

  // Group destination pickers
  if (timState.mode === 'group') {
    const destLbl = document.createElement('div');
    destLbl.className = 'tim-lbl';
    destLbl.textContent = 'Destination (applies to all)';

    const destGrid = document.createElement('div');
    destGrid.className = 'tim-dest';
    destGrid.append(
      makePicker('Project', 'tim-sel', buildProjOptions(timState.groupProjId), val => {
        timState.groupProjId = val;
        const proj = state.projects[val];
        timState.groupChildId = (sortedChildren(proj || {})[0] || {})._key || null;
        timState.groupPhaseId = (sortedPhases(proj || {})[0]) ? phaseKey(sortedPhases(proj || {})[0]) : null;
        timState.lines.forEach(l => { l.projId = val; l.childId = timState.groupChildId; l.phaseId = timState.groupPhaseId; });
        buildTaskImportModal();
      }),
      makePicker('Item', 'tim-sel', buildChildOptions(timState.groupProjId, timState.groupChildId), val => {
        timState.groupChildId = val;
        timState.lines.forEach(l => l.childId = val);
        buildTaskImportModal();
      }),
      makePicker('Phase', 'tim-sel', buildPhaseOptions(timState.groupProjId, timState.groupPhaseId), val => {
        timState.groupPhaseId = val;
        timState.lines.forEach(l => l.phaseId = val);
        buildTaskImportModal();
      })
    );
    body.append(destLbl, destGrid);
  }

  // Task rows
  const tasksLbl = document.createElement('div');
  tasksLbl.className = 'tim-lbl';
  const included = timState.lines.filter(l => l.included).length;
  tasksLbl.textContent = 'Tasks (' + included + ' selected)';

  const tasksList = document.createElement('div');
  tasksList.className = 'tim-tasks';

  timState.lines.forEach((line, i) => {
    const row = document.createElement('div');
    row.className = 'tim-row' + (line.included ? '' : ' excluded');
    row.style.paddingLeft = (12 + line.depth * 16) + 'px';

    const top = document.createElement('div');
    top.className = 'tim-top';

    const chk = document.createElement('div');
    chk.className = 'tim-chk' + (line.included ? ' on' : '');
    chk.textContent = line.included ? '\u2713' : '';
    chk.addEventListener('click', () => {
      timState.lines[i].included = !timState.lines[i].included;
      buildTaskImportModal();
    });

    const inp = document.createElement('input');
    inp.className = 'tim-inp';
    inp.value = line.name;
    inp.placeholder = 'Task name';
    inp.addEventListener('input', () => { timState.lines[i].name = inp.value; });

    top.append(chk, inp);
    row.appendChild(top);

    if (timState.mode === 'individual') {
      const idest = document.createElement('div');
      idest.className = 'tim-idest';
      idest.append(
        makePicker('', 'tim-isel', buildProjOptions(line.projId), val => {
          timState.lines[i].projId = val;
          const proj = state.projects[val];
          timState.lines[i].childId = (sortedChildren(proj || {})[0] || {})._key || null;
          timState.lines[i].phaseId = sortedPhases(proj||{})[0] ? phaseKey(sortedPhases(proj||{})[0]) : null;
          buildTaskImportModal();
        }),
        makePicker('', 'tim-isel', buildChildOptions(line.projId, line.childId), val => {
          timState.lines[i].childId = val;
          buildTaskImportModal();
        }),
        makePicker('', 'tim-isel', buildPhaseOptions(line.projId, line.phaseId), val => {
          timState.lines[i].phaseId = val;
          buildTaskImportModal();
        })
      );
      row.appendChild(idest);
    }

    tasksList.appendChild(row);
  });

  body.append(tasksLbl, tasksList);

  // Footer
  const footer = document.createElement('div');
  footer.className = 'tim-footer';

  const count = document.createElement('span');
  count.className = 'tim-count';
  count.textContent = included + ' of ' + timState.lines.length + ' tasks will be added';

  const btnRow = document.createElement('div');
  btnRow.style.cssText = 'display:flex;gap:8px';

  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'btn btn-ghost';
  cancelBtn.textContent = 'Cancel';
  cancelBtn.addEventListener('click', closeTaskImport);

  const addBtn = document.createElement('button');
  addBtn.className = 'btn btn-primary';
  addBtn.textContent = '+ Add ' + included + ' Task' + (included !== 1 ? 's' : '');
  addBtn.addEventListener('click', confirmTaskImport);

  btnRow.append(cancelBtn, addBtn);
  footer.append(count, btnRow);

  modal.append(header, body, footer);
  overlay.appendChild(modal);
  document.body.appendChild(overlay);
}

function makePicker(label, cls, optionsHTML, onChange) {
  const wrap = document.createElement('div');
  if (label) {
    const lbl = document.createElement('div');
    lbl.className = 'tim-lbl';
    lbl.textContent = label;
    wrap.appendChild(lbl);
  }
  const sel = document.createElement('select');
  sel.className = cls;
  sel.innerHTML = optionsHTML;
  sel.addEventListener('change', () => onChange(sel.value));
  wrap.appendChild(sel);
  return wrap;
}

function buildProjOptions(selectedId) {
  return sortedProjects().map(p =>
    '<option value="' + p._key + '"' + (p._key === selectedId ? ' selected' : '') + '>' + escHtml(p.name) + '</option>'
  ).join('');
}

function buildChildOptions(projId, selectedId) {
  const proj = state.projects[projId];
  if (!proj) return '<option value="">— no items —</option>';
  return sortedChildren(proj).map(c =>
    '<option value="' + c._key + '"' + (c._key === selectedId ? ' selected' : '') + '>' + escHtml(c.name) + '</option>'
  ).join('');
}

function buildPhaseOptions(projId, selectedId) {
  const proj = state.projects[projId];
  if (!proj) return '<option value="">— no phases —</option>';
  return sortedPhases(proj).map(ph =>
    '<option value="' + phaseKey(ph) + '"' + (phaseKey(ph) === selectedId ? ' selected' : '') + '>' + escHtml(ph.name) + '</option>'
  ).join('');
}

function closeTaskImport() {
  document.querySelector('.tim-overlay')?.remove();
}

function timSetMode(mode) {
  timState.mode = mode;
  buildTaskImportModal();
}

async function confirmTaskImport() {
  const toAdd = timState.lines.filter(l => l.included && l.name.trim() && l.projId && l.childId && l.phaseId);
  if (!toAdd.length) { toast('No valid tasks to add'); return; }
  timState.groupProjId  = toAdd[0].projId;
  timState.groupChildId = toAdd[0].childId;
  timState.groupPhaseId = toAdd[0].phaseId;

  await Promise.all(toAdd.map(l =>
    fbPush('tasks/' + l.projId + '/' + l.childId + '/' + l.phaseId, {
      name: l.name.trim(), status: 'todo', createdAt: Date.now()
    })
  ));

  closeTaskImport();

  // Navigate to first destination and ensure phase is expanded
  const destProjId  = toAdd[0].projId;
  const destChildId = toAdd[0].childId;
  const destPhaseId = toAdd[0].phaseId;

  state.projectId = destProjId;
  state.childId   = destChildId;
  state.view      = 'list';

  // Ensure the destination phase is expanded
  const phKey = destProjId + '_' + destChildId + '_' + destPhaseId;
  state.expandedPhases[phKey] = true;

  // Small delay to let Firebase listener update state.tasks before rendering
  setTimeout(() => {
    renderAll();
    toast(toAdd.length + ' task' + (toAdd.length !== 1 ? 's' : '') + ' added \u2713');
  }, 600);
}

  document.getElementById('loading').innerHTML=`<div style="color:var(--red);font-size:14px;text-align:center">Failed to connect.<br>${err.message}</div>`;
});
