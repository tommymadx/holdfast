<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
// ═══════════════════════════════════════════════════
// FIREBASE
// ═══════════════════════════════════════════════════
firebase.initializeApp({
  apiKey:"AIzaSyDxYaI67RPV5wBlkPneTKY1YMasVQJxG-Y",
  authDomain:"app-timeline-v2.firebaseapp.com",
  projectId:"app-timeline-v2",
  storageBucket:"app-timeline-v2.firebasestorage.app",
  messagingSenderId:"145319848970",
  appId:"1:145319848970:web:b6086b8caf00faf8a2c3f3",
  databaseURL:"https://app-timeline-v2-default-rtdb.firebaseio.com"
});
const db = firebase.database();
const ROOT = 'holdfast_v8';

function fbRef(p){ return db.ref(`${ROOT}/${p}`); }
async function fbSet(p,v){ await fbRef(p).set(v); }
async function fbUpdate(p,v){ await fbRef(p).update(v); }
async function fbPush(p,v){ const r=fbRef(p).push(); await r.set(v); return r.key; }
async function fbRemove(p){ await fbRef(p).remove(); }
function fbListen(p,cb){ fbRef(p).on('value',s=>cb(s.val())); }

// ═══════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════
function getTeamMembers() {
  return Object.values(state.members || {}).sort((a,b)=>(a.order||0)-(b.order||0));
}
const PRIORITIES = [
  {value:'urgent',label:'Urgent',icon:'🚩',color:'#ef4444'},
  {value:'high',  label:'High',  icon:'🏴',color:'#f59e0b'},
  {value:'normal',label:'Normal',icon:'🔵',color:'#3b82f6'},
  {value:'low',   label:'Low',   icon:'⚑', color:'#6b7280'},
];
const STATUSES = [
  {value:'todo',       label:'To Do',      cls:'todo'},
  {value:'in-progress',label:'In Progress',cls:'in-progress'},
  {value:'complete',   label:'Complete',   cls:'complete'},
  {value:'na',         label:'N/A',        cls:'na'},
  {value:'missed',     label:'Missed',     cls:'missed'},
];
const PROJECT_TYPES = [
  {id:'album', label:'Album Release', icon:'💿', desc:'Singles + campaign',
   phases:['I - Strategy & Timeline','II - Creative Prep','III - Marketing Prep','IV - Execution','V - Monitoring']},
  {id:'tour',  label:'Tour',          icon:'🎤', desc:'Legs, venues, logistics',
   phases:['I - Planning','II - Promotion','III - On Sale','IV - Show Day']},
  {id:'custom',label:'Custom',        icon:'📁', desc:'Start from scratch',
   phases:['I - Phase I','II - Phase II','III - Phase III']},
];
const DOT_COLORS = ['dot-0','dot-1','dot-2','dot-3','dot-4','dot-5','dot-6','dot-7','dot-8'];

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let state = {
  view: 'home',          // 'home'|'list'|'gantt'|'settings'
  projectId: null,
  childId: null,         // null = show all children
  expandedProjects: {},
  expandedChildren: {},
  expandedPhases: {},
  expandedTasks: {},
  selectedTasks: new Set(),
  projects: {},          // live from firebase
  tasks: {},             // live from firebase
  members: {},           // live from firebase
};
let activeDropdown = null;

// ═══════════════════════════════════════════════════
// SEED DATA — Darkness To Light
// ═══════════════════════════════════════════════════
const DTL_SEED = {
  name: 'Darkness To Light',
  type: 'album',
  color: 'dot-0',
  createdAt: Date.now(),
  phases: {
    ph1:{id:'ph1',name:'Creative Prep',  color:'pc-0',order:0},
    ph2:{id:'ph2',name:'Marketing Prep', color:'pc-1',order:1},
    ph3:{id:'ph3',name:'Execution',      color:'pc-2',order:2},
    ph4:{id:'ph4',name:'Monitoring',     color:'pc-3',order:3},
  },
  children: {
    c1:{id:'c1',name:'When The Magic Is Gone', color:'dot-0',order:0,releaseDate:'2026-03-06'},
    c2:{id:'c2',name:'Homeless In The Rain',   color:'dot-1',order:1,releaseDate:'2026-03-20'},
    c3:{id:'c3',name:'2084',                   color:'dot-2',order:2,releaseDate:'2026-04-17'},
    c4:{id:'c4',name:'Tragedy',                color:'dot-3',order:3,releaseDate:'2026-05-15'},
    c5:{id:'c5',name:'Hope Is On Your Side',   color:'dot-4',order:4,releaseDate:'2026-06-12'},
    c6:{id:'c6',name:'Stranger and The Sheriff',color:'dot-5',order:5,releaseDate:'2026-07-10'},
  }
};

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
async function init() {
  const snap = await fbRef('projects').get();
  if (!snap.exists()) {
    await fbSet('projects/dtl', DTL_SEED);
  } else {
    // Patch release dates onto existing DTL children if missing
    // Only run if projects/dtl exists (not a push-key project)
    const dtlSnap = await fbRef('projects/dtl').get();
    if (dtlSnap.exists()) {
      const releaseDates = {
        c1:'2026-03-06', c2:'2026-03-20', c3:'2026-04-17',
        c4:'2026-05-15', c5:'2026-06-12', c6:'2026-07-10'
      };
      const childSnap = await fbRef('projects/dtl/children').get();
      if (childSnap.exists()) {
        const dtlChildren = childSnap.val();
        const patches = {};
        Object.entries(releaseDates).forEach(([cId, date]) => {
          if (dtlChildren[cId] && !dtlChildren[cId].releaseDate) {
            patches[`${cId}/releaseDate`] = date;
          }
        });
        if (Object.keys(patches).length > 0) {
          await fbUpdate('projects/dtl/children', patches);
        }
      }
    }
  }
  fbListen('projects', data => { state.projects = data || {}; renderAll(); });
  fbListen('tasks',    data => { state.tasks    = data || {}; renderAll(); });
  // Seed default members if none exist
  const memSnap = await fbRef('members').get();
  if (!memSnap.exists()) {
    const defaults = {
      charlie: {id:'charlie',name:'Charlie',initials:'CH',color:'#7c5cfc',role:'Lead Vocals / Guitar / Keys',order:0},
      mikey:   {id:'mikey',  name:'Mikey',  initials:'MI',color:'#3b82f6',role:'Bass / Vocals',order:1},
      tommy:   {id:'tommy',  name:'Tommy',  initials:'TM',color:'#f97316',role:'Drums / Vocals',order:2},
      casey:   {id:'casey',  name:'Casey',  initials:'CA',color:'#22c55e',role:'Manager',order:3},
    };
    await fbSet('members', defaults);
  }
  fbListen('members', data => { state.members = data || {}; renderAll(); });
  initNotes();
  initSelectionWatcher();
  document.getElementById('loading').style.display = 'none';
}

// ═══════════════════════════════════════════════════
// RENDER ALL
// ═══════════════════════════════════════════════════
function renderAll() {
  renderSidebar();
  renderBreadcrumb();
  renderViewTabs();
  renderCurrentView();
  updateActionBar();
}

// ═══════════════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════════════
function renderSidebar() {
  const nav = document.getElementById('sb-nav');
  let html = '';

  // Home
  html += `<div class="nav-row ${state.view==='home'&&!state.projectId?'active':''}" onclick="goHome()">
    <span class="nr-icon">🏠</span><span class="nr-label">Home</span>
  </div>`;

  html += `<div class="sb-section-label">Projects</div>`;

  const projects = sortedProjects();
  projects.forEach(proj => {
    const isExpanded = state.expandedProjects[proj._key] !== false;
    const isProjActive = state.projectId === proj._key && !state.childId && state.view !== 'home';
    const comp = getProjectCompletion(proj._key);
    const projChildren = sortedChildren(proj);
    const projDone = comp.total > 0 && comp.pct === 100 && projChildren.length > 0 &&
      projChildren.every(c => getChildCompletion(proj._key, c._key).total > 0);

    html += `
      <div class="nav-row ${isProjActive?'active':''}" onclick="selectProject('${proj._key}')">
        <span class="nr-icon">${projDone?'✅':proj.type==='album'?'💿':proj.type==='tour'?'🎤':'📁'}</span>
        <span class="nr-label">${escHtml(proj.name)}</span>
        <span class="nr-menu" onclick="projectMenu(event,'${proj._key}')">•••</span>
        <span class="nr-chevron ${isExpanded?'open':''}" onclick="toggleProjectExpand(event,'${proj._key}')">▶</span>
      </div>
    `;

    // Progress bar
    if (comp.total > 0) {
      html += `<div class="project-progress-bar"><div class="project-progress-fill" style="width:${comp.pct}%"></div></div>`;
    }

    // Children
    const children = sortedChildren(proj);
    html += `<div class="nav-children" style="max-height:${isExpanded?'600px':'0'}">`;
    children.forEach(child => {
      const isChildActive = state.childId === child._key && state.projectId === proj._key;
      const cc = getChildCompletion(proj._key, child._key);
      const dotCls = cc.complete && cc.total>0 ? child.color+' dot-complete' : child.color;
      const badge = cc.total===0 ? '' : cc.complete
        ? `<span class="cr-done">✓</span>`
        : `<span class="cr-progress">${cc.done}/${cc.total}</span>`;
      const dateBadge = renderReleaseDateBadge(child.releaseDate);
      html += `
        <div class="child-row ${isChildActive?'active':''}" onclick="selectChild('${proj._key}','${child._key}')">
          <span class="cr-dot ${dotCls}"></span>
          <span class="cr-label">${escHtml(child.name)}</span>
          ${dateBadge}
          ${badge}
          <span class="cr-menu" onclick="childMenu(event,'${proj._key}','${child._key}')">•••</span>
        </div>
      `;
    });
    // Add child button
    html += `<div class="child-row" style="color:var(--text3)" onclick="addChildInline('${proj._key}')">
      <span class="cr-dot" style="background:var(--text3);opacity:.4"></span>
      <span class="cr-label" style="font-style:italic">+ Add item</span>
    </div>`;
    html += `</div>`;
  });

  html += `<div class="add-project-btn" onclick="openNewProjectModal()">＋ New Project</div>`;
  nav.innerHTML = html;
}

function sortedProjects() {
  return Object.entries(state.projects)
    .map(([k,v])=>({...v,_key:k}))
    .sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));
}

function sortedChildren(proj) {
  if (!proj.children) return [];
  return Object.entries(proj.children)
    .map(([k,v])=>({...v,_key:k}))
    .sort((a,b)=>(a.order??0)-(b.order??0));
}

// ═══════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════
function goHome() {
  state.view = 'home'; state.projectId = null; state.childId = null;
  renderAll();
}

function selectProject(pKey) {
  state.projectId = pKey; state.childId = null; state.view = 'list';
  renderAll();
}

function selectChild(pKey, cKey) {
  state.projectId = pKey; state.childId = cKey; state.view = 'list';
  renderAll();
}

function toggleProjectExpand(e, pKey) {
  e.stopPropagation();
  state.expandedProjects[pKey] = state.expandedProjects[pKey] === false ? true : false;
  renderSidebar();
}

function showSettings() {
  state.view = 'settings'; renderAll();
}

// ═══════════════════════════════════════════════════
// BREADCRUMB & TABS
// ═══════════════════════════════════════════════════
function renderBreadcrumb() {
  const el = document.getElementById('tb-breadcrumb');
  if (state.view === 'home') { el.innerHTML = `<span class="crumb cur">Home</span>`; return; }
  if (state.view === 'settings') { el.innerHTML = `<span class="crumb cur">Settings</span>`; return; }
  const proj = state.projects[state.projectId];
  if (!proj) { el.innerHTML=''; return; }
  let html = `<span class="crumb" style="cursor:pointer" onclick="selectProject('${state.projectId}')">${escHtml(proj.name)}</span>`;
  if (state.childId) {
    const child = proj.children?.[state.childId];
    if (child) html += `<span class="sep">/</span><span class="crumb cur">${escHtml(child.name)}</span>`;
  } else {
    html = `<span class="crumb cur">${escHtml(proj.name)} — All</span>`;
  }
  el.innerHTML = html;
}

function renderViewTabs() {
  const el = document.getElementById('tb-views');
  if (state.view === 'home' || state.view === 'settings') { el.innerHTML=''; return; }
  const views = [{id:'list',label:'List',icon:'☰'},{id:'gantt',label:'Gantt',icon:'▬'}];
  el.innerHTML = views.map(v=>`
    <div class="view-btn ${state.view===v.id?'active':''}" onclick="switchView('${v.id}')">
      <span>${v.icon}</span>${v.label}
    </div>`).join('');
}

function switchView(v) { state.view=v; renderViewTabs(); renderCurrentView(); }

// ═══════════════════════════════════════════════════
// VIEW ROUTING
// ═══════════════════════════════════════════════════
function renderCurrentView() {
  ['home-view','list-view','gantt-view','settings-view'].forEach(id=>{
    document.getElementById(id).style.display='none';
  });
  if (state.view==='home')     { document.getElementById('home-view').style.display='block'; renderHomeView(); }
  if (state.view==='list')     { document.getElementById('list-view').style.display='block'; renderListView(); }
  if (state.view==='gantt')    { document.getElementById('gantt-view').style.display='flex'; }
  if (state.view==='settings') { document.getElementById('settings-view').style.display='block'; renderSettingsView(); }
}

// ═══════════════════════════════════════════════════
// HOME VIEW
// ═══════════════════════════════════════════════════
function renderHomeView() {
  const el = document.getElementById('home-view');
  const projects = sortedProjects();
  const cards = projects.map(proj => {
    const comp = getProjectCompletion(proj._key);
    const children = sortedChildren(proj);
    const typeLabel = PROJECT_TYPES.find(t=>t.id===proj.type)?.label || 'Project';
    return `
      <div class="project-card" onclick="selectProject('${proj._key}')">
        <div style="display:flex;align-items:center;margin-bottom:6px">
          <span class="pc-dot ${proj.color}"></span>
          <span class="pc-name">${escHtml(proj.name)}</span>
        </div>
        <div class="pc-type">${typeLabel}</div>
        <div class="pc-stats">
          <div class="pc-stat"><span>${children.length}</span> items</div>
          <div class="pc-stat"><span>${comp.total}</span> tasks</div>
          <div class="pc-stat"><span>${comp.done}</span> complete</div>
        </div>
        <div class="pc-bar-wrap"><div class="pc-bar" style="width:${comp.pct}%"></div></div>
        <div style="font-size:11px;color:var(--text3);margin-top:6px">${comp.pct}% complete</div>
      </div>
    `;
  }).join('');

  el.innerHTML = `
    <div class="home-title">Home</div>
    <div class="home-sub">${projects.length} project${projects.length!==1?'s':''} · Click a card to open</div>
    <div class="project-cards">${cards || '<div style="color:var(--text3);font-size:13px">No projects yet. Click "+ New Project" to get started.</div>'}</div>
  `;
}

// ═══════════════════════════════════════════════════
// LIST VIEW
// ═══════════════════════════════════════════════════
function renderListView() {
  const container = document.getElementById('list-view');
  const proj = state.projects[state.projectId];
  if (!proj) { container.innerHTML=''; return; }

  const phases = sortedPhases(proj);
  const children = state.childId
    ? sortedChildren(proj).filter(c=>c._key===state.childId)
    : sortedChildren(proj);

  let html = `
    <div class="col-headers">
      <div class="col-header"></div>
      <div class="col-header">Name</div>
      <div class="col-header">Assignee</div>
      <div class="col-header">Due Date</div>
      <div class="col-header">Priority</div>
      <div class="col-header">Budget</div>
      <div class="col-header">Status</div>
      <div class="col-header">Start Date</div>
    </div>
  `;

  if (!state.childId) {
    // All children view
    children.forEach(child => {
      const isExp = state.expandedChildren[child._key] !== false;
      const cc = getChildCompletion(state.projectId, child._key);
      const dotCls = cc.complete&&cc.total>0 ? child.color+' dot-complete' : child.color;
      html += `
        <div class="child-section">
          <div class="child-section-header" onclick="toggleChildExpand('${child._key}')">
            <span class="cs-chevron ${isExp?'open':''}">▶</span>
            <span class="cr-dot ${dotCls}" style="width:10px;height:10px;flex-shrink:0"></span>
            <span class="cs-title">${escHtml(child.name)}</span>
            <span class="cs-count">${countChildTasks(state.projectId,child._key)} tasks</span>
          </div>
          ${isExp ? renderChildPhases(state.projectId, proj, child, phases) : ''}
        </div>
      `;
    });
  } else {
    const child = proj.children?.[state.childId];
    if (child) html += renderChildPhases(state.projectId, proj, {...child, _key: state.childId}, phases);
  }

  container.innerHTML = html;
}

function renderChildPhases(projId, proj, child, phases) {
  let html = '';
  phases.forEach((phase, idx) => {
    const pId = phaseKey(phase);
    const phKey = `${projId}_${child._key}_${pId}`;
    const isOpen = state.expandedPhases[phKey] !== false;
    const pTasks = getPhaseTaskList(projId, child._key, pId);

    html += `
      <div class="phase-group" draggable="true"
        data-phase-id="${pId}" data-proj-id="${projId}" data-child-id="${child._key}"
        ondragstart="phaseDragStart(event,'${projId}','${pId}')"
        ondragover="phaseDragOver(event)"
        ondragleave="phaseDragLeave(event)"
        ondrop="phaseDrop(event,'${projId}')">
        <div class="phase-header" onclick="togglePhase('${phKey}')">
          <span class="ph-drag" ondragstart="event.stopPropagation()" onclick="event.stopPropagation()" title="Drag to reorder">⠿</span>
          <span class="ph-chevron ${isOpen?'open':''}">▶</span>
          <span class="phase-pill ${phase.color||'pc-0'}" id="phase-pill-${pId}">${escHtml(phase.name)}</span>
          <span class="ph-more" onclick="openPhaseMenu(event,'${projId}','${child._key}','${pId}')">···</span>
          <span class="ph-count">${pTasks.length}</span>
          <span class="ph-add" onclick="addTask(event,'${projId}','${child._key}','${pId}')">+ Add Task</span>
        </div>
    `;
    if (isOpen) {
      pTasks.forEach(task => {
        html += renderTaskRow(task, projId, child._key, pId, false, null);
        if (task.subtasks && state.expandedTasks[task._key]) {
          Object.entries(task.subtasks).forEach(([sk,sub])=>{
            html += renderTaskRow({...sub,_key:sk}, projId, child._key, pId, true, task._key);
          });
        }
      });
      html += `<div class="add-task-row" data-phkey="${phKey}" data-proj="${projId}" data-child="${child._key}" data-phase="${pId}" onclick="addTask(event,'${projId}','${child._key}','${pId}')">+ Add task</div>`;
    }
    html += `</div>`;
  });
  html += `
    <div class="add-phase-row" onclick="addPhaseToProject('${projId}')">
      <span style="font-size:14px;line-height:1">＋</span> Add Phase
    </div>`;

  // Budget total — sum across this child's phases only
  let totalBudget = 0;
  phases.forEach(ph => {
    getPhaseTaskList(projId, child._key, phaseKey(ph)).forEach(t => {
      if (t.budget) totalBudget += parseFloat(t.budget) || 0;
      if (t.subtasks) Object.values(t.subtasks).forEach(s => { if (s.budget) totalBudget += parseFloat(s.budget) || 0; });
    });
  });
  if (totalBudget > 0) {
    html += `
      <div style="display:grid;grid-template-columns:48px 2fr 120px 110px 90px 100px 120px 110px;padding:10px 20px;border-top:2px solid var(--border2);background:var(--bg);">
        <div></div><div></div><div></div><div></div><div></div>
        <div style="font-size:12px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:4px;">
          <span style="color:var(--text3);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-right:2px;">Total</span>
          $${totalBudget % 1 === 0 ? totalBudget.toLocaleString() : totalBudget.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}
        </div>
        <div></div><div></div>
      </div>`;
  }

  return html;
}

// ── Phase drag-to-reorder ──────────────────────────────────────────────────
let _dragPhaseId = null;

function phaseDragStart(e, projId, phaseId) {
  _dragPhaseId = phaseId;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', phaseId);
  e.currentTarget.style.opacity = '0.4';
}

function phaseDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const group = e.currentTarget;
  group.classList.remove('drag-over-top','drag-over-bottom');
  const rect = group.getBoundingClientRect();
  const mid = rect.top + rect.height / 2;
  group.classList.add(e.clientY < mid ? 'drag-over-top' : 'drag-over-bottom');
}

function phaseDragLeave(e) {
  e.currentTarget.classList.remove('drag-over-top','drag-over-bottom');
}

async function phaseDrop(e, projId) {
  e.preventDefault();
  const target = e.currentTarget;
  target.classList.remove('drag-over-top','drag-over-bottom');

  // If a task is being dragged, handle moving it to this phase
  if (_taskDrag) {
    const { projId: srcProjId, childId: srcChildId, phaseId: srcPhaseId, taskKey } = _taskDrag;
    const targetPhaseId = target.dataset.phaseId;
    const targetChildId = target.dataset.childId || srcChildId;
    if (!targetPhaseId) return;
    if (srcPhaseId === targetPhaseId && srcChildId === targetChildId) return;

    const taskData = getTaskData(srcProjId, srcChildId, srcPhaseId, taskKey, null);
    if (!taskData) return;

    const { _key, ...cleanData } = taskData;
    const targetTasks = getPhaseTaskList(projId, targetChildId, targetPhaseId);
    const newOrder = targetTasks.length; // append to end

    const updates = {};
    updates[`${ROOT}/tasks/${srcProjId}/${srcChildId}/${srcPhaseId}/${taskKey}`] = null;
    updates[`${ROOT}/tasks/${projId}/${targetChildId}/${targetPhaseId}/${taskKey}`] = { ...cleanData, order: newOrder };
    await db.ref('/').update(updates);
    toast('Task moved ✓');
    return;
  }

  const dragId = _dragPhaseId;
  const dropId = target.dataset.phaseId;
  if (!dragId || dragId === dropId) return;

  const proj = state.projects[projId];
  if (!proj) return;

  const phases = sortedPhases(proj);
  const rect = target.getBoundingClientRect();
  const mid = rect.top + rect.height / 2;
  const insertBefore = e.clientY < mid;

  // Build new order: remove dragged, insert at new position
  const without = phases.filter(p => phaseKey(p) !== dragId);
  const dropIdx = without.findIndex(p => phaseKey(p) === dropId);
  const insertIdx = insertBefore ? dropIdx : dropIdx + 1;
  without.splice(insertIdx, 0, phases.find(p => phaseKey(p) === dragId));

  // Write new order values to Firebase as a multi-path update
  const updates = {};
  without.forEach((ph, i) => { updates[`${ROOT}/projects/${projId}/phases/${phaseKey(ph)}/order`] = i; });
  await db.ref('/').update(updates);

  // Reset opacity on dragged element
  document.querySelectorAll('.phase-group').forEach(g => g.style.opacity = '');
  _dragPhaseId = null;
}

function editPhase(e, projId, phaseId) {
  e.stopPropagation();
  const pill = document.getElementById(`phase-pill-${phaseId}`);
  if (!pill) return;
  const currentName = pill.textContent.trim();
  const colorClass = pill.className.replace('phase-pill','').trim();

  const input = document.createElement('input');
  input.className = 'ph-name-input';
  input.value = currentName;
  pill.replaceWith(input);
  input.focus();
  input.select();

  const save = async () => {
    const newName = input.value.trim();
    if (newName && newName !== currentName) {
      await fbSet(`projects/${projId}/phases/${phaseId}/name`, newName);
    }
    // Revert to pill (renderAll will redraw)
    const newPill = document.createElement('span');
    newPill.className = `phase-pill ${colorClass}`;
    newPill.id = `phase-pill-${phaseId}`;
    newPill.textContent = newName || currentName;
    input.replaceWith(newPill);
  };

  input.addEventListener('blur', save);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { input.value = currentName; input.blur(); }
  });
}

async function addPhaseToProject(projId) {
  const proj = state.projects[projId];
  if (!proj) return;
  const name = prompt('Phase name:');
  if (!name || !name.trim()) return;
  const phases = sortedPhases(proj);
  const colorKeys = ['pc-0','pc-1','pc-2','pc-3','pc-4','pc-5'];
  const color = colorKeys[phases.length % colorKeys.length];
  const order = phases.length;
  await fbPush(`projects/${projId}/phases`, { name: name.trim(), color, order });
  toast('Phase added');
}

// ── Task drag-to-reorder (within + across phases) ─────────────────────────
let _taskDrag = null; // { projId, childId, phaseId, taskKey, parentKey }

function taskDragStart(e, projId, childId, phaseId, taskKey, parentKey) {
  _taskDrag = { projId, childId, phaseId, taskKey, parentKey: parentKey||null };
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', taskKey);
  e.currentTarget.classList.add('task-dragging');
  e.stopPropagation(); // don't trigger phase drag
}

function taskDragEnd(e) {
  e.currentTarget.classList.remove('task-dragging');
  document.querySelectorAll('.task-drag-over-top,.task-drag-over-bottom,.task-drag-over-subtask').forEach(el => {
    el.classList.remove('task-drag-over-top','task-drag-over-bottom','task-drag-over-subtask');
  });
  _taskDrag = null;
}

function taskDragOver(e) {
  if (!_taskDrag) return;
  e.preventDefault();
  e.stopPropagation();
  e.dataTransfer.dropEffect = 'move';
  const row = e.currentTarget;
  row.classList.remove('task-drag-over-top','task-drag-over-bottom','task-drag-over-subtask');
  const rect = row.getBoundingClientRect();
  const isSubtaskDrag = !!_taskDrag.parentKey;
  const targetIsSubtask = row.classList.contains('subtask');

  // Show three zones when: dragging a subtask over a parent, OR dragging a parent task over a parent task
  const showThreeZones = !targetIsSubtask && (isSubtaskDrag || (!isSubtaskDrag && row.dataset.task !== _taskDrag.taskKey));
  if (showThreeZones) {
    const third = rect.height / 3;
    if (e.clientY < rect.top + third) {
      row.classList.add('task-drag-over-top');
    } else if (e.clientY > rect.top + third * 2) {
      row.classList.add('task-drag-over-bottom');
    } else {
      row.classList.add('task-drag-over-subtask');   // nest under this task
    }
  } else {
    row.classList.add(e.clientY < rect.top + rect.height / 2 ? 'task-drag-over-top' : 'task-drag-over-bottom');
  }
}

function taskDragLeave(e) {
  e.currentTarget.classList.remove('task-drag-over-top','task-drag-over-bottom','task-drag-over-subtask');
}

async function taskDrop(e, targetProjId, targetChildId, targetPhaseId, targetTaskKey) {
  e.preventDefault();
  e.stopPropagation();
  const row = e.currentTarget;
  const isTop         = row.classList.contains('task-drag-over-top');
  const isSubtaskSlot = row.classList.contains('task-drag-over-subtask');
  const targetIsSubtask = row.classList.contains('subtask');
  const targetParentKey = row.dataset.parent || null;
  row.classList.remove('task-drag-over-top','task-drag-over-bottom','task-drag-over-subtask');

  if (!_taskDrag) return;
  const { projId, childId, phaseId, taskKey, parentKey } = _taskDrag;
  const isSubtaskDrag = !!parentKey;
  if (taskKey === targetTaskKey && parentKey === targetParentKey) return;

  const updates = {};

  // ── CASE 5: Parent task → middle of another parent task → demote to subtask ──
  if (!isSubtaskDrag && isSubtaskSlot && !targetIsSubtask) {
    const taskData = getTaskData(projId, childId, phaseId, taskKey, null);
    if (!taskData) return;
    // Can't nest a task under itself
    if (taskKey === targetTaskKey) return;
    const { _key, subtasks, ...cleanData } = taskData;
    // Remove from top-level
    updates[`${ROOT}/tasks/${projId}/${childId}/${phaseId}/${taskKey}`] = null;
    // Add as subtask under target — subtasks can't themselves have subtasks so we drop subtasks
    const existingSubs = state.tasks?.[targetProjId]?.[targetChildId]?.[targetPhaseId]?.[targetTaskKey]?.subtasks || {};
    updates[`${ROOT}/tasks/${targetProjId}/${targetChildId}/${targetPhaseId}/${targetTaskKey}/subtasks/${taskKey}`] = { ...cleanData, order: Object.keys(existingSubs).length };
    // Re-index remaining top-level tasks
    const remaining = getPhaseTaskList(projId, childId, phaseId).filter(t => t._key !== taskKey);
    remaining.forEach((t,i) => { updates[`${ROOT}/tasks/${projId}/${childId}/${phaseId}/${t._key}/order`] = i; });
    await db.ref('/').update(updates);
    toast('Task nested as subtask ✓');
    return;
  }

  // ── CASE 1: Subtask → middle of a parent task → re-parent ──────────────
  if (isSubtaskDrag && isSubtaskSlot && !targetIsSubtask) {
    if (parentKey === targetTaskKey) return;
    const subData = state.tasks?.[projId]?.[childId]?.[phaseId]?.[parentKey]?.subtasks?.[taskKey];
    if (!subData) return;
    const { _key, ...cleanSub } = { ...subData, _key: taskKey };
    updates[`${ROOT}/tasks/${projId}/${childId}/${phaseId}/${parentKey}/subtasks/${taskKey}`] = null;
    const existingSubs = state.tasks?.[targetProjId]?.[targetChildId]?.[targetPhaseId]?.[targetTaskKey]?.subtasks || {};
    updates[`${ROOT}/tasks/${targetProjId}/${targetChildId}/${targetPhaseId}/${targetTaskKey}/subtasks/${taskKey}`] = { ...cleanSub, order: Object.keys(existingSubs).length };
    await db.ref('/').update(updates);
    toast('Subtask re-parented ✓');
    return;
  }

  // ── CASE 2: Subtask → top/bottom of another subtask → reorder or re-parent ──
  if (isSubtaskDrag && targetIsSubtask) {
    const subData = state.tasks?.[projId]?.[childId]?.[phaseId]?.[parentKey]?.subtasks?.[taskKey];
    if (!subData) return;
    const { _key, ...cleanSub } = { ...subData, _key: taskKey };

    if (parentKey === targetParentKey) {
      // Same parent — reorder
      const subs = Object.entries(state.tasks?.[projId]?.[childId]?.[phaseId]?.[parentKey]?.subtasks || {})
        .map(([k,v])=>({...v,_key:k})).sort((a,b)=>(a.order||0)-(b.order||0));
      const dragIdx = subs.findIndex(s=>s._key===taskKey);
      subs.splice(dragIdx,1);
      const newDrop = subs.findIndex(s=>s._key===targetTaskKey);
      if (newDrop === -1) return;
      subs.splice(isTop ? newDrop : newDrop+1, 0, {...subData,_key:taskKey});
      subs.forEach((s,i)=>{ updates[`${ROOT}/tasks/${projId}/${childId}/${phaseId}/${parentKey}/subtasks/${s._key}/order`]=i; });
    } else {
      // Different parent — move to new parent near targetTaskKey
      updates[`${ROOT}/tasks/${projId}/${childId}/${phaseId}/${parentKey}/subtasks/${taskKey}`] = null;
      const targetSubs = Object.entries(state.tasks?.[targetProjId]?.[targetChildId]?.[targetPhaseId]?.[targetParentKey]?.subtasks || {})
        .map(([k,v])=>({...v,_key:k})).sort((a,b)=>(a.order||0)-(b.order||0));
      const dropIdx = targetSubs.findIndex(s=>s._key===targetTaskKey);
      const insertAt = isTop ? dropIdx : dropIdx+1;
      targetSubs.splice(insertAt, 0, {...cleanSub,_key:taskKey});
      targetSubs.forEach((s,i)=>{
        updates[`${ROOT}/tasks/${targetProjId}/${targetChildId}/${targetPhaseId}/${targetParentKey}/subtasks/${s._key}/order`]=i;
      });
      updates[`${ROOT}/tasks/${targetProjId}/${targetChildId}/${targetPhaseId}/${targetParentKey}/subtasks/${taskKey}`] = {...cleanSub, order: isTop ? dropIdx : dropIdx+1};
    }
    await db.ref('/').update(updates);
    toast('Subtask moved ✓');
    return;
  }

  // ── CASE 3: Subtask → top/bottom of a parent task → promote to top-level ──
  if (isSubtaskDrag && !isSubtaskSlot && !targetIsSubtask) {
    const subData = state.tasks?.[projId]?.[childId]?.[phaseId]?.[parentKey]?.subtasks?.[taskKey];
    if (!subData) return;
    const { _key, ...cleanSub } = { ...subData, _key: taskKey };
    updates[`${ROOT}/tasks/${projId}/${childId}/${phaseId}/${parentKey}/subtasks/${taskKey}`] = null;
    const targetTasks = getPhaseTaskList(targetProjId, targetChildId, targetPhaseId);
    const dropIdx = targetTasks.findIndex(t=>t._key===targetTaskKey);
    const insertAt = Math.max(0, isTop ? dropIdx : dropIdx+1);
    const newList = [...targetTasks];
    newList.splice(insertAt, 0, {...cleanSub,_key:taskKey});
    newList.forEach((t,i)=>{
      if(t._key===taskKey) updates[`${ROOT}/tasks/${targetProjId}/${targetChildId}/${targetPhaseId}/${taskKey}`] = {...cleanSub, order:i};
      else updates[`${ROOT}/tasks/${targetProjId}/${targetChildId}/${targetPhaseId}/${t._key}/order`] = i;
    });
    await db.ref('/').update(updates);
    toast('Subtask promoted ✓');
    return;
  }

  // ── CASE 4: Normal task reorder / cross-phase ───────────────────────────
  const taskData = getTaskData(projId, childId, phaseId, taskKey, null);
  if (!taskData) return;
  const samePhase = (projId===targetProjId && childId===targetChildId && phaseId===targetPhaseId);

  if (samePhase) {
    const tasks = getPhaseTaskList(projId, childId, phaseId);
    const dragIdx = tasks.findIndex(t=>t._key===taskKey);
    const dropIdx = tasks.findIndex(t=>t._key===targetTaskKey);
    if (dragIdx===-1||dropIdx===-1) return;
    const reordered = [...tasks];
    reordered.splice(dragIdx,1);
    const newDropIdx = reordered.findIndex(t=>t._key===targetTaskKey);
    reordered.splice(isTop ? newDropIdx : newDropIdx+1, 0, tasks[dragIdx]);
    reordered.forEach((t,i)=>{ updates[`${ROOT}/tasks/${projId}/${childId}/${phaseId}/${t._key}/order`]=i; });
    await db.ref('/').update(updates);
  } else {
    const targetTasks = getPhaseTaskList(targetProjId, targetChildId, targetPhaseId);
    const dropIdx = targetTasks.findIndex(t=>t._key===targetTaskKey);
    const insertAt = Math.max(0, isTop ? dropIdx : dropIdx+1);
    const { _key, ...cleanData } = taskData;
    const newList = [...targetTasks];
    newList.splice(insertAt,0,{...cleanData,_key:taskKey});
    updates[`${ROOT}/tasks/${projId}/${childId}/${phaseId}/${taskKey}`] = null;
    updates[`${ROOT}/tasks/${targetProjId}/${targetChildId}/${targetPhaseId}/${taskKey}`] = {...cleanData, order:insertAt};
    newList.forEach((t,i)=>{ if(t._key!==taskKey) updates[`${ROOT}/tasks/${targetProjId}/${targetChildId}/${targetPhaseId}/${t._key}/order`]=i; });
    await db.ref('/').update(updates);
  }
  toast('Task moved ✓');
}

// ── Bulk add tasks modal ──────────────────────────────────────────────────
function openBulkAddTasks(projId, childId, phaseId) {
  document.querySelector('.bulk-overlay')?.remove();
  const proj = state.projects[projId];
  const phase = proj?.phases?.[phaseId];
  const child = proj?.children?.[childId];
  const otherChildren = sortedChildren(proj).filter(c => c._key !== childId);
  const existingTasks = getPhaseTaskList(projId, childId, phaseId);

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay bulk-overlay';
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });

  const modal = document.createElement('div');
  modal.className = 'modal';
  modal.style.cssText = 'width:520px;max-height:88vh;overflow-y:auto;';
  modal.addEventListener('click', e => e.stopPropagation());

  // State
  const selectedChildren = new Set(otherChildren.map(c => c._key));
  const selectedExisting = new Set(existingTasks.map(t => t._key));
  let activeTab = 'new';

  function applySection() {
    if (!otherChildren.length) return '';
    return `
      <div class="bulk-apply-section">
        <div class="bulk-apply-label">
          Also apply to other items
          <span class="bulk-apply-toggle" id="bulk-toggle-all">Deselect all</span>
        </div>
        <div class="bulk-child-list" id="bulk-child-list"></div>
      </div>`;
  }

  modal.innerHTML = `
    <div class="modal-title">Bulk Add Tasks</div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:14px">
      <b style="color:var(--text2)">${escHtml(phase?.name||'Phase')}</b>
      ${child ? ` · <b style="color:var(--text2)">${escHtml(child.name)}</b>` : ''}
    </div>
    <div class="bulk-tabs">
      <div class="bulk-tab active" data-tab="new">＋ Add New Tasks</div>
      <div class="bulk-tab" data-tab="copy">⤵ Copy Existing Tasks</div>
    </div>

    <div class="bulk-tab-panel active" id="bulk-panel-new">
      <div class="modal-label">One task per line</div>
      <textarea class="bulk-textarea" id="bulk-textarea" placeholder="Single Art&#10;Content For Socials&#10;Pitch to Blogs&#10;Playlist Pitching"></textarea>
      <div id="bulk-preview" class="bulk-preview"></div>
    </div>

    <div class="bulk-tab-panel" id="bulk-panel-copy">
      <div class="modal-label" style="margin-bottom:8px">Tasks currently in this phase</div>
      ${existingTasks.length ? `
        <div style="display:flex;justify-content:flex-end;margin-bottom:6px">
          <span class="bulk-apply-toggle" id="bulk-toggle-existing">Deselect all</span>
        </div>
        <div class="bulk-existing-list" id="bulk-existing-list"></div>
      ` : `<div style="font-size:12.5px;color:var(--text3);padding:12px 0">No tasks in this phase yet.</div>`}
    </div>

    ${applySection()}

    <div class="modal-footer" style="margin-top:16px">
      <button class="btn btn-ghost" onclick="this.closest('.bulk-overlay').remove()">Cancel</button>
      <button class="btn btn-primary" id="bulk-add-btn">+ Add Tasks</button>
    </div>
  `;

  overlay.appendChild(modal);
  document.body.appendChild(overlay);

  const addBtn = modal.querySelector('#bulk-add-btn');

  // ── Tab switching ──
  modal.querySelectorAll('.bulk-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      activeTab = tab.dataset.tab;
      modal.querySelectorAll('.bulk-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === activeTab));
      modal.querySelectorAll('.bulk-tab-panel').forEach(p => p.classList.toggle('active', p.id === `bulk-panel-${activeTab}`));
      updateBtn();
      if (activeTab === 'new') setTimeout(() => modal.querySelector('#bulk-textarea')?.focus(), 50);
    });
  });

  // ── Add New tab ──
  const textarea = modal.querySelector('#bulk-textarea');
  const preview  = modal.querySelector('#bulk-preview');
  if (textarea) {
    textarea.addEventListener('input', () => { updatePreview(); updateBtn(); });
    setTimeout(() => textarea.focus(), 50);
  }

  function updatePreview() {
    if (!preview) return;
    const lines = getNewLines();
    preview.innerHTML = lines.map(l =>
      `<div class="bulk-preview-item"><span style="color:var(--text3)">◦</span> ${escHtml(l)}</div>`
    ).join('');
  }

  function getNewLines() {
    return (textarea?.value||'').split('\n').map(l=>l.trim()).filter(Boolean);
  }

  // ── Copy Existing tab ──
  function renderExistingList() {
    const list = modal.querySelector('#bulk-existing-list');
    if (!list) return;
    list.innerHTML = '';
    existingTasks.forEach(t => {
      const on = selectedExisting.has(t._key);
      const item = document.createElement('div');
      item.className = `bulk-existing-item${on?' on':''}`;
      item.innerHTML = `
        <div class="bulk-existing-cb${on?' on':''}">${on?'✓':''}</div>
        <span class="bulk-existing-name">${escHtml(t.name||'Untitled')}</span>
      `;
      item.addEventListener('click', () => {
        if (selectedExisting.has(t._key)) selectedExisting.delete(t._key);
        else selectedExisting.add(t._key);
        renderExistingList();
        updateExistingToggle();
        updateBtn();
      });
      list.appendChild(item);
    });
  }

  function updateExistingToggle() {
    const t = modal.querySelector('#bulk-toggle-existing');
    if (!t) return;
    t.textContent = selectedExisting.size === existingTasks.length ? 'Deselect all' : 'Select all';
  }

  const exToggle = modal.querySelector('#bulk-toggle-existing');
  if (exToggle) {
    exToggle.addEventListener('click', () => {
      if (selectedExisting.size === existingTasks.length) selectedExisting.clear();
      else existingTasks.forEach(t => selectedExisting.add(t._key));
      renderExistingList();
      updateExistingToggle();
      updateBtn();
    });
  }

  // ── Apply-to children list ──
  function renderChildList() {
    const list = modal.querySelector('#bulk-child-list');
    if (!list) return;
    list.innerHTML = '';
    otherChildren.forEach(c => {
      const on = selectedChildren.has(c._key);
      const item = document.createElement('div');
      item.className = `bulk-child-item${on?' on':''}`;
      item.innerHTML = `
        <div class="bulk-child-cb${on?' on':''}">${on?'✓':''}</div>
        <span class="cr-dot ${c.color||'dot-0'}" style="width:8px;height:8px;border-radius:50%;flex-shrink:0"></span>
        <span class="bulk-child-name">${escHtml(c.name)}</span>
      `;
      item.addEventListener('click', () => {
        if (selectedChildren.has(c._key)) selectedChildren.delete(c._key);
        else selectedChildren.add(c._key);
        renderChildList();
        updateChildToggle();
        updateBtn();
      });
      list.appendChild(item);
    });
  }

  function updateChildToggle() {
    const t = modal.querySelector('#bulk-toggle-all');
    if (!t) return;
    t.textContent = selectedChildren.size === otherChildren.length ? 'Deselect all' : 'Select all';
  }

  const childToggle = modal.querySelector('#bulk-toggle-all');
  if (childToggle) {
    childToggle.addEventListener('click', () => {
      if (selectedChildren.size === otherChildren.length) selectedChildren.clear();
      else otherChildren.forEach(c => selectedChildren.add(c._key));
      renderChildList();
      updateChildToggle();
      updateBtn();
    });
  }

  // ── Update button label ──
  function updateBtn() {
    const targets = 1 + selectedChildren.size;
    if (activeTab === 'new') {
      const lines = getNewLines();
      if (!lines.length) { addBtn.textContent = '+ Add Tasks'; return; }
      addBtn.textContent = `+ Add ${lines.length} Task${lines.length!==1?'s':''} to ${targets} item${targets!==1?'s':''}`;
    } else {
      const count = selectedExisting.size;
      if (!count) { addBtn.textContent = '+ Copy Tasks'; return; }
      addBtn.textContent = `+ Copy ${count} Task${count!==1?'s':''} to ${targets} item${targets!==1?'s':''}`;
    }
  }

  // ── Save ──
  addBtn.addEventListener('click', async () => {
    const targets = [childId, ...Array.from(selectedChildren)];
    addBtn.disabled = true;
    addBtn.textContent = 'Adding…';

    if (activeTab === 'new') {
      const lines = getNewLines();
      if (!lines.length) { addBtn.disabled = false; updateBtn(); return; }
      for (const tChildId of targets) {
        for (const name of lines) {
          await fbPush(`tasks/${projId}/${tChildId}/${phaseId}`, { name, status: 'todo', createdAt: Date.now() });
        }
      }
      const total = lines.length * targets.length;
      overlay.remove();
      toast(`${total} task${total!==1?'s':''} added across ${targets.length} item${targets.length!==1?'s':''} ✓`);
    } else {
      const tasksToCopy = existingTasks.filter(t => selectedExisting.has(t._key));
      if (!tasksToCopy.length) { addBtn.disabled = false; updateBtn(); return; }
      // Copy to all selected OTHER children only (not current child — they already have them)
      const copyTargets = Array.from(selectedChildren);
      for (const tChildId of copyTargets) {
        for (const t of tasksToCopy) {
          const { _key, ...data } = t;
          await fbPush(`tasks/${projId}/${tChildId}/${phaseId}`, { ...data, status: 'todo', createdAt: Date.now() });
        }
      }
      const total = tasksToCopy.length * copyTargets.length;
      overlay.remove();
      toast(`${total} task${total!==1?'s':''} copied to ${copyTargets.length} item${copyTargets.length!==1?'s':''} ✓`);
    }
  });

  renderExistingList();
  renderChildList();
  updateChildToggle();
  updateBtn();
}

async function applyPhaseToAllChildren(projId, phaseId) {
  const proj = state.projects[projId];
  if (!proj) return;
  const phase = proj.phases?.[phaseId];
  if (!phase) return;
  const children = sortedChildren(proj);
  let added = 0;
  for (const child of children) {
    // Check if this child already has this phase's tasks node
    const existing = state.tasks?.[projId]?.[child._key]?.[phaseId];
    if (!existing) {
      // Just ensure the phase exists in the project (it already does) —
      // tasks node will be created when first task is added
      added++;
    }
  }
  toast(`Phase available for all ${children.length} items ✓`);
}

async function deletePhase(projId, phaseId) {
  const proj = state.projects[projId];
  if (!proj) return;
  const phase = proj.phases?.[phaseId];
  // Warn if any child has tasks in this phase
  const children = sortedChildren(proj);
  let taskCount = 0;
  children.forEach(c => {
    const tasks = getPhaseTaskList(projId, c._key, phaseId);
    taskCount += tasks.length;
  });
  const msg = taskCount > 0
    ? `This phase has ${taskCount} task${taskCount!==1?'s':''} across all items. Delete anyway?`
    : `Delete phase "${phase?.name}"?`;
  if (!confirm(msg)) return;
  await fbRemove(`projects/${projId}/phases/${phaseId}`);
  toast('Phase deleted');
}

// ── Manage Phases modal ───────────────────────────────────────────────────
function openManagePhases(projId) {
  const proj = state.projects[projId];
  if (!proj) return;
  document.querySelector('.mp-overlay')?.remove();

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay mp-overlay';
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
  renderManagePhasesModal(projId, overlay);
}

function renderManagePhasesModal(projId, overlay) {
  const proj = state.projects[projId];
  if (!proj) return;
  const phases = sortedPhases(proj);
  const colorKeys = ['pc-0','pc-1','pc-2','pc-3','pc-4','pc-5'];

  const modal = document.createElement('div');
  modal.className = 'modal';
  modal.style.cssText = 'width:480px;max-height:80vh;overflow-y:auto;';

  const title = document.createElement('div');
  title.className = 'modal-title';
  title.textContent = 'Manage Phases';

  const list = document.createElement('div');
  list.id = 'mp-list';

  let mpPhases = phases.map(p => ({ id: phaseKey(p), name: p.name, color: p.color || 'pc-0', _delete: false }));
  let mpDragIdx = null;

  function renderRows() {
    list.innerHTML = '';
    mpPhases.forEach((ph, idx) => {
      if (ph._delete) return;
      const row = document.createElement('div');
      row.className = 'mp-row';
      row.draggable = true;
      row.dataset.idx = idx;

      row.innerHTML = `
        <span class="mp-drag">⠿</span>
        <span class="mp-color ${ph.color}"></span>
        <input class="mp-input" value="${escHtml(ph.name)}" placeholder="Phase name">
        <div class="mp-del" title="Remove">✕</div>
      `;

      row.querySelector('.mp-input').addEventListener('input', e => { mpPhases[idx].name = e.target.value; });

      row.querySelector('.mp-del').addEventListener('click', () => {
        if (!confirm(`Remove "${ph.name}"?`)) return;
        mpPhases[idx]._delete = true;
        renderRows();
      });

      // Drag to reorder within modal
      row.addEventListener('dragstart', e => {
        mpDragIdx = idx;
        e.dataTransfer.effectAllowed = 'move';
        row.style.opacity = '0.4';
      });
      row.addEventListener('dragend', () => { row.style.opacity = ''; });
      row.addEventListener('dragover', e => {
        e.preventDefault();
        list.querySelectorAll('.mp-row').forEach(r => r.classList.remove('drag-over'));
        row.classList.add('drag-over');
      });
      row.addEventListener('dragleave', () => row.classList.remove('drag-over'));
      row.addEventListener('drop', e => {
        e.preventDefault();
        row.classList.remove('drag-over');
        if (mpDragIdx === null || mpDragIdx === idx) return;
        const active = mpPhases.filter(p => !p._delete);
        const dragged = mpPhases[mpDragIdx];
        const visible = mpPhases.filter(p => !p._delete);
        const toVisIdx = visible.findIndex(p => p === mpPhases[idx]);
        // Reorder in mpPhases
        mpPhases.splice(mpDragIdx, 1);
        const newIdx = mpPhases.indexOf(mpPhases.filter(p=>!p._delete)[toVisIdx] ?? mpPhases[mpPhases.length-1]);
        mpPhases.splice(newIdx >= 0 ? newIdx : mpPhases.length, 0, dragged);
        mpDragIdx = null;
        renderRows();
      });

      list.appendChild(row);
    });
  }
  renderRows();

  const addBtn = document.createElement('div');
  addBtn.className = 'add-phase-btn';
  addBtn.style.cssText = 'margin-top:10px;';
  addBtn.innerHTML = '＋ Add phase';
  addBtn.addEventListener('click', () => {
    mpPhases.push({ id: null, name: 'New Phase', color: colorKeys[mpPhases.length % colorKeys.length], _delete: false });
    renderRows();
    // Focus the last input
    setTimeout(() => { const inputs = list.querySelectorAll('.mp-input'); inputs[inputs.length-1]?.focus(); inputs[inputs.length-1]?.select(); }, 50);
  });

  const footer = document.createElement('div');
  footer.className = 'modal-footer';
  footer.style.marginTop = '16px';

  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'btn btn-ghost';
  cancelBtn.textContent = 'Cancel';
  cancelBtn.addEventListener('click', () => overlay.remove());

  const saveBtn = document.createElement('button');
  saveBtn.className = 'btn btn-primary';
  saveBtn.textContent = 'Save Changes';
  saveBtn.addEventListener('click', async () => {
    saveBtn.textContent = 'Saving…';
    saveBtn.disabled = true;
    const colorKeys = ['pc-0','pc-1','pc-2','pc-3','pc-4','pc-5'];
    let order = 0;
    for (const ph of mpPhases) {
      if (ph._delete) {
        if (ph.id) await fbRemove(`projects/${projId}/phases/${ph.id}`);
      } else if (!ph.id) {
        // New phase
        const color = colorKeys[order % colorKeys.length];
        await fbPush(`projects/${projId}/phases`, { name: ph.name.trim() || 'New Phase', color, order });
        order++;
      } else {
        // Update existing
        await fbSet(`projects/${projId}/phases/${ph.id}/name`, ph.name.trim() || 'Phase');
        await fbSet(`projects/${projId}/phases/${ph.id}/order`, order);
        order++;
      }
    }
    overlay.remove();
    toast('Phases updated ✓');
  });

  footer.append(cancelBtn, saveBtn);
  modal.append(title, list, addBtn, footer);
  overlay.appendChild(modal);
}

function sortedPhases(proj) {
  if (!proj.phases) return [];
  return Object.entries(proj.phases)
    .map(([k,v]) => ({...v, _key:k}))
    .sort((a,b) => (a.order??0) - (b.order??0));
}

function phaseKey(phase) {
  // Use Firebase key (_key) as the storage key for tasks
  // Fall back to phase.id for backwards compatibility with seeded DTL data
  return phase._key || phase.id;
}

function getPhaseTaskList(projId, childId, phaseId) {
  const raw = state.tasks?.[projId]?.[childId]?.[phaseId];
  if (!raw || typeof raw!=='object') return [];
  return Object.entries(raw)
    .map(([k,v])=>({...v,_key:k}))
    .sort((a,b) => {
      if (a.order !== undefined && b.order !== undefined) return a.order - b.order;
      if (a.order !== undefined) return -1;
      if (b.order !== undefined) return 1;
      return (a.createdAt||0) - (b.createdAt||0);
    });
}

// ═══════════════════════════════════════════════════
// TASK ROW
// ═══════════════════════════════════════════════════
function renderTaskRow(task, projId, childId, phaseId, isSubtask, parentId) {
  const hasChildren = !isSubtask && task.subtasks && Object.keys(task.subtasks).length>0;
  const hasMissedSubtask = !isSubtask && hasChildren &&
    Object.values(task.subtasks).some(s => s.status === 'missed');
  const isExpanded = state.expandedTasks[task._key];
  const selKey = isSubtask
    ? `${projId}|${childId}|${phaseId}|${task._key}|${parentId}`
    : `${projId}|${childId}|${phaseId}|${task._key}`;
  const isSelected = state.selectedTasks.has(selKey);
  const statusCls = task.status||'todo';
  const dotCls = statusCls==='complete'?'complete':statusCls==='in-progress'?'in-progress':statusCls==='na'?'na':statusCls==='missed'?'missed':'todo';
  const assignee = task.assigneeId ? getTeamMembers().find(m=>m.id===task.assigneeId) : null;
  // Multi-assignee support: assignees map + mainAssigneeId
  const assigneeIds = task.assignees ? Object.keys(task.assignees) : (task.assigneeId ? [task.assigneeId] : []);
  const mainId = task.mainAssigneeId || assigneeIds[0] || null;
  const assigneeMembers = assigneeIds.map(id=>getTeamMembers().find(m=>m.id===id)).filter(Boolean);
  function assigneeCellHtml() {
    if (!assigneeMembers.length) return `<div class="avatar-empty">+</div>`;
    const sorted = [...assigneeMembers].sort((a,b) => a.id===mainId ? -1 : b.id===mainId ? 1 : 0);
    const avatars = sorted.map(m =>
      `<div class="avatar${m.id===mainId?' avatar-main':''}" style="background:${m.color}" title="${escHtml(m.name)}${m.id===mainId?' (lead)':''}">${escHtml(m.initials)}</div>`
    ).join('');
    return `<div class="avatar-stack">${avatars}</div>`;
  }
  const priority = task.priority ? PRIORITIES.find(p=>p.value===task.priority) : null;
  const statusObj = STATUSES.find(s=>s.value===statusCls)||STATUSES[0];
  const dueFmt = task.dueDate?formatDate(task.dueDate):'';
  const startFmt = task.startDate?formatDate(task.startDate):'';
  const dueCls = task.dueDate?(isOverdue(task.dueDate)?'overdue':isSoon(task.dueDate)?'soon':''):'empty';
  const pId = isSubtask?parentId:'';

  return `
    <div class="task-row${isSubtask?' subtask':''}${isSelected?' selected':''}${hasMissedSubtask?' has-missed-subtask':''}"
      data-task="${task._key}" data-selkey="${escAttr(selKey)}"
      data-proj="${projId}" data-child="${childId}" data-phase="${phaseId}"
      draggable="true"
      ${isSubtask?`data-parent="${parentId}"`:''}
      ondragstart="taskDragStart(event,'${projId}','${childId}','${phaseId}','${task._key}','${isSubtask?parentId:''}')"
      ondragend="taskDragEnd(event)"
      ondragover="taskDragOver(event)"
      ondragleave="taskDragLeave(event)"
      ondrop="taskDrop(event,'${projId}','${childId}','${phaseId}','${task._key}')">
      <div class="row-first-col">
        <span class="task-drag-handle">⠿</span>
        <div class="row-checkbox${isSelected?' checked':''}" onclick="toggleSelect(event,'${escAttr(selKey)}')">${isSelected?'✓':''}</div>
        ${hasChildren?`<div class="row-expand${isExpanded?' open':''}" onclick="toggleTaskExpand('${task._key}')"><span class="re-arrow">▶</span></div>`:''}
      </div>
      <div class="task-name-cell${isSubtask?' subtask-indent':''}">
        <div class="task-status-dot ${dotCls}" onclick="cycleStatus('${projId}','${childId}','${phaseId}','${task._key}','${pId}')"></div>
        <span class="task-name-text" ondblclick="editTaskName(event,'${projId}','${childId}','${phaseId}','${task._key}','${pId}')">${escHtml(task.name||'Untitled')}</span>
        <span class="task-hover-tools">
          ${!isSubtask?`<span class="hover-tool-btn" title="Add subtask" onclick="addSubtask('${projId}','${childId}','${phaseId}','${task._key}')">⤷</span>`:''}
          <span class="hover-tool-btn" title="Rename" onclick="editTaskName(event,'${projId}','${childId}','${phaseId}','${task._key}','${pId}')">✎</span>
          <span class="hover-tool-btn" style="color:var(--red);opacity:.7" title="Delete" onclick="deleteTask('${projId}','${childId}','${phaseId}','${task._key}','${pId}')">🗑</span>
        </span>
      </div>
      <div class="assignee-cell" onclick="openAssigneeDD(event,'${projId}','${childId}','${phaseId}','${task._key}','${pId}')">
        ${assigneeCellHtml()}
      </div>
      <div class="date-cell ${dueCls}" onclick="openDatePicker(event,'${projId}','${childId}','${phaseId}','${task._key}','${pId}','due')">
        ${dueFmt||'<span style="color:var(--text3)">—</span>'}
      </div>
      <div class="priority-cell" onclick="openPriorityDD(event,'${projId}','${childId}','${phaseId}','${task._key}','${pId}')">
        ${priority?`<span style="color:${priority.color}">${priority.icon} ${priority.label}</span>`:`<span style="color:var(--text3)">—</span>`}
      </div>
      <div class="budget-cell${task.budget?'':' empty'}" ondblclick="editBudget(event,'${projId}','${childId}','${phaseId}','${task._key}','${pId}')">
        ${task.budget?`<span>$${escHtml(String(task.budget))}</span>`:`<span style="color:var(--text3)">—</span>`}
      </div>
      <div class="status-cell" onclick="openStatusDD(event,'${projId}','${childId}','${phaseId}','${task._key}','${pId}')">
        <span class="status-badge ${statusObj.cls}">${statusObj.label}</span>
      </div>
      <div class="date-cell ${task.startDate?'':'empty'}" onclick="openDatePicker(event,'${projId}','${childId}','${phaseId}','${task._key}','${pId}','start')">
        ${startFmt||'<span style="color:var(--text3)">—</span>'}
      </div>
    </div>`;
}

function taskPath(projId,childId,phaseId,taskKey,parentKey,field) {
  const base = parentKey
    ? `tasks/${projId}/${childId}/${phaseId}/${parentKey}/subtasks/${taskKey}`
    : `tasks/${projId}/${childId}/${phaseId}/${taskKey}`;
  return field ? `${base}/${field}` : base;
}

function getTaskData(projId,childId,phaseId,taskKey,parentKey) {
  return parentKey
    ? state.tasks?.[projId]?.[childId]?.[phaseId]?.[parentKey]?.subtasks?.[taskKey]
    : state.tasks?.[projId]?.[childId]?.[phaseId]?.[taskKey];
}

// TASK CRUD
// ═══════════════════════════════════════════════════
async function addTask(e, projId, childId, phaseId) {
  e.stopPropagation();
  const phKey = `${projId}_${childId}_${phaseId}`;
  const inputId = `nti-${phKey}`;
  if (document.getElementById(inputId)) { document.getElementById(inputId).focus(); return; }
  const addRow = document.querySelector(`.add-task-row[data-phkey="${phKey}"]`);
  if (!addRow) return;

  const newRow = document.createElement('div');
  newRow.className = 'new-task-row';
  newRow.innerHTML = `
    <div></div>
    <div style="display:flex;align-items:center;gap:8px;min-width:0">
      <div class="task-status-dot todo" style="flex-shrink:0;pointer-events:none"></div>
      <input class="new-task-input" id="${inputId}" placeholder="Task name…" autocomplete="off">
    </div>
    <div style="font-size:11px;color:var(--text3);padding-left:4px">Enter · Esc</div>`;
  addRow.parentNode.insertBefore(newRow, addRow);
  const input = document.getElementById(inputId);
  input.focus();
  let done=false;
  const save = async()=>{ if(done)return; done=true; const n=input.value.trim(); newRow.remove(); if(!n)return; await fbPush(`tasks/${projId}/${childId}/${phaseId}`,{name:n,status:'todo',createdAt:Date.now()}); toast('Task added'); };
  const cancel = ()=>{ if(done)return; done=true; newRow.remove(); };
  input.addEventListener('keydown',ev=>{ if(ev.key==='Enter'){ev.preventDefault();save();} if(ev.key==='Escape')cancel(); });
  input.addEventListener('blur',()=>setTimeout(save,120));
}

async function addSubtask(projId, childId, phaseId, parentKey) {
  state.expandedTasks[parentKey]=true;
  renderListView();
  const parentRow = document.querySelector(`[data-task="${parentKey}"]`);
  if (!parentRow) return;
  let insertAfter=parentRow, next=parentRow.nextSibling;
  while(next&&next.classList&&next.classList.contains('subtask')){ insertAfter=next; next=next.nextSibling; }
  const inputId=`nsi-${parentKey}`;
  if(document.getElementById(inputId))return;
  const newRow=document.createElement('div');
  newRow.className='new-task-row subtask';
  newRow.style.background='rgba(0,0,0,.2)';
  newRow.innerHTML=`<div></div><div style="display:flex;align-items:center;gap:8px;min-width:0;padding-left:24px"><div class="task-status-dot todo" style="flex-shrink:0;pointer-events:none"></div><input class="new-task-input" id="${inputId}" placeholder="Subtask name…" autocomplete="off"></div><div style="font-size:11px;color:var(--text3)">Enter · Esc</div>`;
  insertAfter.parentNode.insertBefore(newRow,insertAfter.nextSibling);
  const input=document.getElementById(inputId); input.focus();
  let done=false;
  const save=async()=>{ if(done)return; done=true; const n=input.value.trim(); newRow.remove(); if(!n)return; await fbPush(`tasks/${projId}/${childId}/${phaseId}/${parentKey}/subtasks`,{name:n,status:'todo',createdAt:Date.now()}); toast('Subtask added'); };
  const cancel=()=>{ if(done)return; done=true; newRow.remove(); };

}

async function executeCopyTo(destProjId, destChildId, destPhaseId) {
  const selected = [...state.selectedTasks];
  const existing = getPhaseTaskList(destProjId, destChildId, destPhaseId);
  let order = existing.length;

  for (const sk of selected) {
    const p = sk.split('|');
    const isSubtask = !!p[4];

    // Get raw task data from state
    const rawData = isSubtask
      ? state.tasks?.[p[0]]?.[p[1]]?.[p[2]]?.[p[4]]?.subtasks?.[p[3]]
      : state.tasks?.[p[0]]?.[p[1]]?.[p[2]]?.[p[3]];

    if (!rawData) continue;

    // Strip internal fields; pull subtasks out separately
    const { subtasks, ...taskFields } = rawData;

    // Push the parent task (without subtasks first)
    const newRef = await fbRef(`tasks/${destProjId}/${destChildId}/${destPhaseId}`).push({
      ...taskFields,
      order: order++,
      createdAt: Date.now(),
    });

    const newKey = newRef.key;

    // Now copy subtasks explicitly under the new task key
    if (subtasks && typeof subtasks === 'object') {
      const subEntries = Object.entries(subtasks);
      for (let i = 0; i < subEntries.length; i++) {
        const [, subData] = subEntries[i];
        await fbRef(`tasks/${destProjId}/${destChildId}/${destPhaseId}/${newKey}/subtasks`).push({
          ...subData,
          order: i,
          createdAt: subData.createdAt || Date.now(),
        });
      }
    }
  }

  toast(`Copied ${selected.length} task${selected.length!==1?'s':''} ✓`);
}

function openAssigneeDD(e, projId, childId, phaseId, taskKey, parentKey) {
  e.stopPropagation();
  closeDropdown();

  const task = getTaskData(projId, childId, phaseId, taskKey, parentKey);
  if (!task) return;

  const currentIds = task.assignees ? Object.keys(task.assignees) : (task.assigneeId ? [task.assigneeId] : []);
  const currentMain = task.mainAssigneeId || currentIds[0] || null;
  let selected = new Set(currentIds);
  let mainId = currentMain;

  const rect = e.currentTarget.getBoundingClientRect();
  const panel = document.createElement('div');
  panel.className = 'assignee-panel';

  function rebuildPanel() {
    panel.innerHTML = `<div class="ap-title">Assignees  <span style="color:var(--text3);font-weight:400;font-size:9px">★ = main</span></div>`;
    getTeamMembers().forEach(m => {
      const on = selected.has(m.id);
      const isMain = m.id === mainId;
      const row = document.createElement('div');
      row.className = `ap-member${on?' on':''}`;
      row.innerHTML = `
        <div class="ap-cb${on?' on':''}">${on?'✓':''}</div>
        <div class="avatar" style="background:${m.color};width:18px;height:18px;font-size:8px;flex-shrink:0">${escHtml(m.initials)}</div>
        <div class="ap-name">${escHtml(m.name)}</div>
        ${on?`<div class="ap-star${isMain?' main':''}" title="${isMain?'Main assignee':'Set as main'}" data-mid="${m.id}">★</div>`:''}`;

      // Toggle membership
      row.addEventListener('click', async e2 => {
        e2.stopPropagation();
        if (selected.has(m.id)) {
          selected.delete(m.id);
          if (mainId === m.id) mainId = [...selected][0] || null;
        } else {
          selected.add(m.id);
          if (!mainId) mainId = m.id;
        }
        await saveAssignees();
        rebuildPanel();
      });

      // Star click — set as main
      const star = row.querySelector('.ap-star');
      if (star) {
        star.addEventListener('click', async e2 => {
          e2.stopPropagation();
          mainId = m.id;
          await saveAssignees();
          rebuildPanel();
        });
      }

      panel.appendChild(row);
    });

    const sep = document.createElement('div'); sep.className = 'ap-sep';
    const clr = document.createElement('div');
    clr.className = 'ap-clear';
    clr.innerHTML = '✕  Clear all';
    clr.addEventListener('click', async e2 => {
      e2.stopPropagation();
      selected.clear(); mainId = null;
      await saveAssignees();
      closeDropdown();
    });
    panel.append(sep, clr);
  }

  async function saveAssignees() {
    const base = taskPath(projId, childId, phaseId, taskKey, parentKey);
    const assigneesObj = {};
    selected.forEach(id => { assigneesObj[id] = true; });
    await fbSet(base + '/assignees', selected.size ? assigneesObj : null);
    await fbSet(base + '/mainAssigneeId', mainId || null);
    // Clear legacy single-assignee field
    await fbRemove(base + '/assigneeId');
  }

  rebuildPanel();

  // Create overlay
  const overlayEl = document.createElement('div');
  overlayEl.className = 'dropdown-overlay';
  overlayEl.addEventListener('click', () => { overlayEl.remove(); panel.remove(); activeDropdown = null; });

  // Position with viewport clamping — render hidden first to measure
  panel.style.visibility = 'hidden';
  panel.style.top = '0'; panel.style.left = '0';
  document.body.append(overlayEl, panel);

  requestAnimationFrame(() => {
    const ph = panel.offsetHeight || 300;
    const pw = panel.offsetWidth || 230;
    const top = rect.bottom + 4 + ph > window.innerHeight
      ? Math.max(4, rect.top - ph - 4)
      : rect.bottom + 4;
    const left = Math.min(rect.left, window.innerWidth - pw - 8);
    panel.style.top = `${Math.max(4, top)}px`;
    panel.style.left = `${Math.max(8, left)}px`;
    panel.style.visibility = '';
  });

  activeDropdown = { overlay: overlayEl, menu: panel };
}

function renderReleaseDateBadge(dateStr) {
  if (!dateStr) return '';
  const now = new Date();
  const rel = new Date(dateStr + 'T00:00:00');
  const diff = rel - now;
  const diffDays = Math.ceil(diff / 86400000);
  const label = rel.toLocaleDateString('en-US', {month:'short', day:'numeric'});
  if (diff < 0) {
    // Already released — muted
    return `<span class="cr-date out">${label}</span>`;
  } else if (diffDays <= 7) {
    // Within 7 days — amber warning
    return `<span class="cr-date soon">🔔 ${label}</span>`;
  } else {
    return `<span class="cr-date upcoming">${label}</span>`;
  }
}

// ═══════════════════════════════════════════════════
function getChildCompletion(projId, childId) {
  const proj=state.projects[projId]; if(!proj)return{total:0,done:0,pct:0,complete:false};
  const phases=sortedPhases(proj);
  let total=0,done=0;
  phases.forEach(ph=>{
    const tasks=getPhaseTaskList(projId,childId,phaseKey(ph));
    tasks.forEach(t=>{
      if(t.status==='na'||t.status==='missed'){} else { total++; if(t.status==='complete')done++; }
      if(t.subtasks)Object.values(t.subtasks).forEach(s=>{ if(s.status!=='na'&&s.status!=='missed'){ total++; if(s.status==='complete')done++; } });
    });
  });
  return{total,done,pct:total>0?Math.round(done/total*100):0,complete:total>0&&done===total};
}

function getProjectCompletion(projId) {
  const proj=state.projects[projId]; if(!proj)return{total:0,done:0,pct:0};
  const children=sortedChildren(proj);
  let total=0,done=0;
  children.forEach(c=>{ const cc=getChildCompletion(projId,c._key); total+=cc.total; done+=cc.done; });
  return{total,done,pct:total>0?Math.round(done/total*100):0};
}

function countChildTasks(projId,childId) {
  const proj=state.projects[projId]; if(!proj)return 0;
  return sortedPhases(proj).reduce((acc,ph)=>acc+getPhaseTaskList(projId,childId,phaseKey(ph)).length,0);
}
